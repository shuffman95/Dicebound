name: Deploy Dicebound PWA to GitHub Pages

# Builds the game and publishes it to GitHub Pages so it can be installed on
# iOS/Android via "Add to Home Screen".
#
# One-time setup by the repo owner: Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". After that, every push to the default branch
# (re)deploys the game to https://<owner>.github.io/<repo>/.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Build web bundle
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
