<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0b14" />
  <title>Dicebound: The Hollow Crown</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS home-screen / standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dicebound" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>
  <div id="dice-layer" class="dice-layer hidden" aria-hidden="true">
    <div class="dice-die" id="dice-die">20</div>
    <div class="dice-caption" id="dice-caption"></div>
  </div>
  <script src="app.js"></script>
  <script>
    // Register the service worker for offline play (HTTPS / localhost only).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => { /* offline cache unavailable; game still runs online */ });
      });
    }
  </script>
</body>
</html>
