34\u0435\u043B\u044F\u0442\u0441\u044F \u0438\u043C \u0432\u0441\u0451 \u0440\u0430\u0432\u043D\u043E. \u041F\u0435\u0440\u0435\u043F\u0430\u0447\u043A\u0430\u043D\u043D\u044B\u0439 \u0441\u0430\u0436\u0435\u0439 \u0440\u0435\u0431\u0451\u043D\u043E\u043A \u0441\u043C\u043E\u0442\u0440\u0438\u0442 \u043D\u0430 \u0432\u0430\u0441 \u043E\u0433\u0440\u043E\u043C\u043D\u044B\u043C\u0438 \u0433\u043B\u0430\u0437\u0430\u043C\u0438; \u0445\u0440\u043E\u043C\u043E\u0439 \u0447\u0435\u043B\u043E\u0432\u0435\u043A \u0443 \u0441\u0442\u0435\u043D\u044B \u043F\u043E\u0434\u0447\u0451\u0440\u043A\u043D\u0443\u0442\u043E \u043D\u0435 \u0441\u043C\u043E\u0442\u0440\u0438\u0442.",choices:["\u041F\u043E\u0433\u043E\u0432\u043E\u0440\u0438\u0442\u044C \u0441 \u0430\u043F\u0442\u0435\u043A\u0430\u0440\u0448\u0435\u0439 \u041C\u0430\u0440\u0435\u043D","\u041F\u0440\u0438\u0441\u0435\u0441\u0442\u044C \u0438 \u043F\u043E\u0433\u043E\u0432\u043E\u0440\u0438\u0442\u044C \u0441 \u0440\u0435\u0431\u0451\u043D\u043A\u043E\u043C","\u0421\u0435\u0441\u0442\u044C \u0440\u044F\u0434\u043E\u043C \u0441 \u0445\u0440\u043E\u043C\u044B\u043C \u0441\u0442\u0440\u0430\u0436\u043D\u0438\u043A\u043E\u043C","\u041F\u0440\u043E\u0447\u0435\u0441\u0442\u044C: \u0414\u0435\u0442\u0441\u043A\u0438\u0439 \u0431\u0443\u043A\u0432\u0430\u0440\u044C \u0410\u043B\u0434\u0435\u0440\u043C\u0443\u0440\u0430","\u041F\u0440\u043E\u0447\u0435\u0441\u0442\u044C: \u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443\u0441\u043A\u0430\u044F \u0441\u0447\u0451\u0442\u043D\u0430\u044F \u043A\u043D\u0438\u0433\u0430","\u0412\u0435\u0440\u043D\u0443\u0442\u044C\u0441\u044F \u043A \u043E\u0433\u043D\u044E \u043F\u043E\u0437\u0436\u0435"]},maren_a:{title:"\u041C\u0430\u0440\u0435\u043D",text:"\u041C\u0430\u0440\u0435\u043D \u0442\u0440\u0451\u0442 \u043F\u0435\u0441\u0442\u0438\u043A\u043E\u043C, \u043D\u0435 \u043F\u043E\u0434\u043D\u0438\u043C\u0430\u044F \u0433\u043B\u0430\u0437. \xAB\u0425\u043E\u0442\u0438\u0442\u0435 \u0437\u043D\u0430\u0442\u044C, \u043F\u0440\u043E\u0434\u0435\u0440\u0436\u0438\u043C\u0441\u044F \u043B\u0438 \u043C\u044B, \u043F\u043E\u043A\u0430 \u0432\u044B \u0434\u0435\u043B\u0430\u0435\u0442\u0435 \u0441\u0432\u043E\u0451 \u0434\u0435\u043B\u043E. \u041D\u0435 \u043F\u0440\u043E\u0434\u0435\u0440\u0436\u0438\u043C\u0441\u044F \u2014 \u043D\u0435 \u0432\u0441\u0435. \u041D\u043E \u043D\u0435\u043A\u043E\u0442\u043E\u0440\u044B\u0435 \u0434\u0430, \u0430 \u044D\u0442\u043E \u0431\u043E\u043B\u044C\u0448\u0435, \u0447\u0435\u043C \u043F\u043E\u0437\u0432\u043E\u043B\u044F\u043B\u0430 \u0432\u0447\u0435\u0440\u0430\u0448\u043D\u044F\u044F \u0430\u0440\u0438\u0444\u043C\u0435\u0442\u0438\u043A\u0430\xBB. \u041E\u043D\u0430 \u043A\u0438\u0432\u0430\u0435\u0442 \u043D\u0430 \u044E\u0433. \xAB\u041D\u0435 \u043D\u0435\u0441\u0438\u0442\u0435 \u043D\u0430\u0441 \u0432 \u0433\u043E\u043B\u043E\u0432\u0435 \u0442\u0430\u043C. \u041D\u0435\u0441\u0438\u0442\u0435 \u0434\u0435\u043B\u043E. \u0412\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u0439\u0442\u0435\u0441\u044C, \u0435\u0441\u043B\u0438 \u0441\u043C\u043E\u0436\u0435\u0442\u0435\xBB.",choices:["\u041E\u0442\u043E\u0439\u0442\u0438"]},pip_a:{title:"\u041F\u0438\u043F",text:"\u0420\u0435\u0431\u0451\u043D\u043E\u043A \u2014 \u041F\u0438\u043F, \u043A\u0430\u043A \u0435\u0451 \u043A\u0442\u043E-\u0442\u043E \u0437\u043E\u0432\u0451\u0442 \u2014 \u0431\u043E\u0447\u043A\u043E\u043C \u043F\u043E\u0434\u0431\u0438\u0440\u0430\u0435\u0442\u0441\u044F \u0431\u043B\u0438\u0436\u0435. \xAB\u0412\u044B \u043F\u0440\u0430\u0432\u0434\u0430 \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u0438? \u041F\u0430\u043F\u043A\u0430 \u0433\u043E\u0432\u043E\u0440\u0438\u043B, \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u0438 \u2014 \u043F\u0440\u043E\u0441\u0442\u043E \u0441\u043A\u0430\u0437\u043A\u0430, \u0447\u0442\u043E\u0431 \u043C\u044B \u0445\u0440\u0430\u0431\u0440\u0438\u043B\u0438\u0441\u044C\xBB. \u041F\u0430\u0443\u0437\u0430. \xAB\u0410 \u043E\u043D\u043E \u0440\u0430\u0431\u043E\u0442\u0430\u0435\u0442? \u042D\u0442\u043E, \u0445\u0440\u0430\u0431\u0440\u0438\u0442\u044C\u0441\u044F?\xBB \u041E\u043D\u0430 \u043D\u0435 \u0436\u0434\u0451\u0442 \u043E\u0442\u0432\u0435\u0442\u0430, \u043B\u0438\u0448\u044C \u043D\u0430 \u043C\u0438\u0433 \u0441\u0436\u0438\u043C\u0430\u0435\u0442 \u0432\u0430\u0448\u0443 \u0440\u0443\u043A\u0443 \u0438 \u0443\u0431\u0435\u0433\u0430\u0435\u0442 \u043E\u0431\u0440\u0430\u0442\u043D\u043E \u043A \u043E\u0433\u043D\u044E, \u0434\u043E\u0432\u043E\u043B\u044C\u043D\u0430\u044F.",choices:["\u0412\u0441\u0442\u0430\u0442\u044C"]},garrow_a:{title:"\u0413\u044D\u0440\u0440\u043E\u0443",text:"\u0425\u0440\u043E\u043C\u043E\u0433\u043E \u0437\u043E\u0432\u0443\u0442 \u0413\u044D\u0440\u0440\u043E\u0443; \u043E\u043D \u0434\u0435\u0440\u0436\u0430\u043B \u044D\u0442\u0438 \u0432\u043E\u0440\u043E\u0442\u0430, \u043F\u043E\u043A\u0430 \u043D\u0435 \u043E\u0442\u043A\u0430\u0437\u0430\u043B\u0430 \u043D\u043E\u0433\u0430. \u041E\u043D \u043D\u0435 \u0441\u043C\u043E\u0442\u0440\u0438\u0442 \u0432\u0430\u043C \u0432 \u0433\u043B\u0430\u0437\u0430. \xAB\u0412\u044B\u0441\u0442\u0443\u043F\u0438\u043B\u0438, \u0437\u043D\u0430\u0447\u0438\u0442. \u0412\u043E\u0448\u043B\u0438 \u043F\u0440\u044F\u043C\u0438\u043A\u043E\u043C \u0442\u0443\u0434\u0430, \u043E\u0442\u043A\u0443\u0434\u0430 \u043E\u0441\u0442\u0430\u043B\u044C\u043D\u044B\u0435 \u0431\u0435\u0436\u0430\u043B\u0438\xBB. \u041E\u043D \u0441\u043F\u043B\u0451\u0432\u044B\u0432\u0430\u0435\u0442 \u0432 \u0443\u0433\u043B\u0438. \xAB\u041D\u0435 \u043E\u0431\u0440\u0430\u0449\u0430\u0439\u0442\u0435 \u0432\u043D\u0438\u043C\u0430\u043D\u0438\u044F. \u042F \u0431\u044B \u043F\u043E\u0448\u0451\u043B, \u043A\u0430\u0431\u044B \u043D\u043E\u0433\u0430 \u043F\u0443\u0441\u0442\u0438\u043B\u0430, \u2014 \u0438 \u043C\u044B \u043E\u0431\u0430 \u0437\u043D\u0430\u043B\u0438 \u0431\u044B, \u0447\u0442\u043E \u044F \u0432\u0440\u0443\xBB.",choices:["\u041E\u0441\u0442\u0430\u0432\u0438\u0442\u044C \u0435\u0433\u043E \u0443 \u043E\u0433\u043D\u044F"]},commons2:{title:"\u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443 \u2014 \u041E\u0431\u0449\u0438\u0439 \u043E\u0447\u0430\u0433",text:"\u0412\u0435\u0441\u0442\u044C \u043E \u043F\u0430\u0434\u0435\u043D\u0438\u0438 \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u044F \u0434\u043E\u0431\u0440\u0430\u043B\u0430\u0441\u044C \u0434\u043E \u043E\u0447\u0430\u0433\u0430 \u043F\u0440\u0435\u0436\u0434\u0435 \u0432\u0430\u0441. \u0412 \u0437\u0430\u043B\u0435 \u043D\u0435 \u0442\u0435\u043F\u043B\u0435\u0435, \u043D\u043E \u0442\u0438\u0448\u0438\u043D\u0430 \u0432 \u043D\u0451\u043C \u043F\u0435\u0440\u0435\u043C\u0435\u043D\u0438\u043B\u0430\u0441\u044C \u2014 \u0442\u0435\u043F\u0435\u0440\u044C \u043E\u043D\u0430 \u0441\u043B\u0443\u0448\u0430\u0435\u0442, \u0430 \u043D\u0435 \u043F\u0440\u043E\u0441\u0442\u043E \u0436\u0434\u0451\u0442. \u0421\u0442\u0430\u0440\u044B\u0439 \u0434\u043E\u0437\u043E\u0440\u043D\u044B\u0439 \u043E\u0431\u0435\u0440\u0435\u0433 \u0413\u044D\u0440\u0440\u043E\u0443 \u0432\u0438\u0441\u0438\u0442 \u043D\u0430 \u0433\u0432\u043E\u0437\u0434\u0435 \u0443 \u0434\u0432\u0435\u0440\u0438.",choices:["\u041F\u043E\u0433\u043E\u0432\u043E\u0440\u0438\u0442\u044C \u0441 \u041C\u0430\u0440\u0435\u043D","\u041F\u043E\u0433\u043E\u0432\u043E\u0440\u0438\u0442\u044C \u0441 \u041F\u0438\u043F","\u041F\u043E\u0433\u043E\u0432\u043E\u0440\u0438\u0442\u044C \u0441 \u0413\u044D\u0440\u0440\u043E\u0443","\u0412\u0437\u044F\u0442\u044C \u0434\u043E\u0437\u043E\u0440\u043D\u044B\u0439 \u043E\u0431\u0435\u0440\u0435\u0433 \u0413\u044D\u0440\u0440\u043E\u0443 \u0441 \u0433\u0432\u043E\u0437\u0434\u044F","\u041F\u0440\u043E\u0447\u0435\u0441\u0442\u044C: \u041F\u043E\u0441\u043B\u0435\u0434\u043D\u0438\u0439 \u0430\u043B\u044C\u043C\u0430\u043D\u0430\u0445","\u0412\u0435\u0440\u043D\u0443\u0442\u044C\u0441\u044F \u043A \u043E\u0433\u043D\u044E \u043F\u043E\u0437\u0436\u0435"]},maren_b:{title:"\u041C\u0430\u0440\u0435\u043D",text:"\xAB\u0412\u044B \u0443\u043F\u043E\u043A\u043E\u0438\u043B\u0438 \u0442\u0432\u0430\u0440\u044C \u043D\u0430 \u0434\u043E\u0440\u043E\u0433\u0435, \u2014 \u0433\u043E\u0432\u043E\u0440\u0438\u0442 \u041C\u0430\u0440\u0435\u043D. \u2014 \u041B\u044E\u0434\u0438 \u0433\u043E\u0432\u043E\u0440\u044F\u0442, \u0442\u0443\u043C\u0430\u043D \u043D\u0430 \u0447\u0430\u0441 \u043F\u043E\u0440\u0435\u0434\u0435\u043B. \u041C\u043E\u0436\u0435\u0442, \u0438 \u043F\u043E\u0440\u0435\u0434\u0435\u043B\xBB. \u041E\u043D\u0430, \u043D\u0435 \u043F\u0440\u043E\u0441\u044F, \u0441\u0443\u0451\u0442 \u0441\u0432\u0435\u0436\u0443\u044E \u043C\u0430\u0437\u044C \u0432\u0430\u043C \u0432 \u043A\u043E\u0442\u043E\u043C\u043A\u0443. \xAB\u041D\u0430\u0434\u0435\u0436\u0434\u0430 \u2014 \u0442\u0430\u043A\u043E\u0439 \u0436\u0435 \u0438\u043D\u0441\u0442\u0440\u0443\u043C\u0435\u043D\u0442, \u043A\u0430\u043A \u043B\u044E\u0431\u043E\u0439 \u0434\u0440\u0443\u0433\u043E\u0439. \u041D\u0435 \u0434\u0430\u0439\u0442\u0435 \u0435\u0439 \u0437\u0430\u0442\u0443\u043F\u0438\u0442\u044C\u0441\u044F. \u041D\u043E \u0438 \u043D\u0435 \u0432\u044B\u0431\u0440\u0430\u0441\u044B\u0432\u0430\u0439\u0442\u0435\xBB.",choices:["\u041E\u0442\u043E\u0439\u0442\u0438"]},pip_b:{title:"\u041F\u0438\u043F",text:"\u041F\u0438\u043F \u043D\u0430\u0437\u043D\u0430\u0447\u0438\u043B\u0430 \u0441\u0435\u0431\u044F \u0432\u0430\u0448\u0438\u043C \u0433\u043B\u0430\u0448\u0430\u0442\u0430\u0435\u043C. \xAB\u042F \u0432\u0441\u0435\u043C \u0441\u043A\u0430\u0437\u0430\u043B\u0430, \u0447\u0442\u043E \u0432\u044B \u043F\u043E\u0431\u0435\u0434\u0438\u0442\u0435. \u042F \u0413\u041E\u0412\u041E\u0420\u0418\u041B\u0410 \u0438\u043C\xBB. \u041F\u043E\u0442\u043E\u043C, \u0432\u0434\u0440\u0443\u0433 \u0441\u0435\u0440\u044C\u0451\u0437\u043D\u0430\u044F, \u043A\u0430\u043A \u0443\u043C\u0435\u044E\u0442 \u043B\u0438\u0448\u044C \u0434\u0435\u0442\u0438: \xAB\u041D\u043E \u0432\u044B \u0438\u0434\u0451\u0442\u0435 \u0434\u0430\u043B\u044C\u0448\u0435. \u041A \u043F\u043B\u043E\u0445\u043E\u0439 \u0447\u0430\u0441\u043E\u0432\u043D\u0435. \u0412\u044B \u0432\u0441\u0451 \u0440\u0430\u0432\u043D\u043E \u0432\u0435\u0440\u043D\u0451\u0442\u0435\u0441\u044C?\xBB \u0412\u044B \u0433\u043E\u0432\u043E\u0440\u0438\u0442\u0435, \u0447\u0442\u043E \u043F\u043E\u0441\u0442\u0430\u0440\u0430\u0435\u0442\u0435\u0441\u044C. \u041E\u043D\u0430 \u0442\u0432\u0451\u0440\u0434\u043E \u0440\u0435\u0448\u0430\u0435\u0442, \u0447\u0442\u043E \u044D\u0442\u043E \u0437\u043D\u0430\u0447\u0438\u0442 \xAB\u0434\u0430\xBB.",choices:["\u0412\u0441\u0442\u0430\u0442\u044C"]},garrow_b:{title:"\u0413\u044D\u0440\u0440\u043E\u0443",text:"\u0413\u044D\u0440\u0440\u043E\u0443 \u043F\u043E\u0447\u0442\u0438 \u0447\u0442\u043E \u0441\u043C\u043E\u0442\u0440\u0438\u0442 \u043D\u0430 \u0432\u0430\u0441. \xAB\u0421\u043B\u044B\u0445\u0430\u043B, \u0447\u0442\u043E \u0432\u044B \u0441\u0434\u0435\u043B\u0430\u043B\u0438\xBB. \u0414\u043E\u043B\u0433\u0430\u044F \u043F\u0430\u0443\u0437\u0430 \u2014 \u0441\u0430\u043C\u043E\u0435 \u0431\u043B\u0438\u0437\u043A\u043E\u0435 \u043A \u0438\u0437\u0432\u0438\u043D\u0435\u043D\u0438\u044E, \u0447\u0442\u043E \u0443 \u043D\u0435\u0433\u043E \u0435\u0441\u0442\u044C. \xAB\u041C\u043E\u0439 \u0434\u043E\u0437\u043E\u0440\u043D\u044B\u0439 \u043E\u0431\u0435\u0440\u0435\u0433 \u043D\u0430 \u0433\u0432\u043E\u0437\u0434\u0435. \u041C\u043D\u0435 \u043D\u0435 \u043F\u043E\u043C\u043E\u0433, \u043D\u043E \u0436\u0435\u043B\u0435\u0437\u043E \u0434\u043E\u0431\u0440\u043E\u0435. \u0412\u043E\u0437\u044C\u043C\u0438\u0442\u0435, \u043A\u0430\u043A \u043F\u043E\u0439\u0434\u0451\u0442\u0435, \u0438 \u043D\u0435 \u0434\u0435\u043B\u0430\u0439\u0442\u0435 \u0438\u0437 \u044D\u0442\u043E\u0433\u043E \u0438\u0441\u0442\u043E\u0440\u0438\u0438\xBB. \u041E\u043D \u043E\u0442\u0432\u043E\u0440\u0430\u0447\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043A \u0443\u0433\u043B\u044F\u043C \u043F\u0440\u0435\u0436\u0434\u0435, \u0447\u0435\u043C \u0432\u044B \u0443\u0441\u043F\u0435\u0432\u0430\u0435\u0442\u0435.",choices:["\u041E\u0441\u0442\u0430\u0432\u0438\u0442\u044C \u0435\u0433\u043E \u0443 \u043E\u0433\u043D\u044F"]},commons3:{title:"\u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443 \u2014 \u041E\u0431\u0449\u0438\u0439 \u043E\u0447\u0430\u0433, \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u044F\u044F \u043D\u043E\u0447\u044C",text:"\u0412\u0441\u0435 \u0437\u043D\u0430\u044E\u0442, \u0447\u0442\u043E \u0437\u043D\u0430\u0447\u0438\u0442 \u0432\u044B\u0441\u0442\u0443\u043F\u0438\u0442\u044C \u043D\u0430 \u0426\u0438\u0442\u0430\u0434\u0435\u043B\u044C. \u041E\u0433\u043E\u043D\u044C \u0441\u0435\u0433\u043E\u0434\u043D\u044F \u0440\u0430\u0437\u043B\u043E\u0436\u0435\u043D \u0432\u044B\u0441\u043E\u043A\u043E, \u0441\u043B\u043E\u0432\u043D\u043E \u0442\u0435\u043F\u043B\u043E \u043C\u043E\u0436\u043D\u043E \u0437\u0430\u043F\u0430\u0441\u0442\u0438 \u043D\u0430 \u0437\u0430\u0432\u0442\u0440\u0430. \u0412\u0430\u043C \u0441\u0431\u0435\u0440\u0435\u0433\u043B\u0438 \u043B\u0443\u0447\u0448\u0438\u0435 \u043C\u0435\u0441\u0442\u0430 \u0443 \u0443\u0433\u043B\u0435\u0439.",choices:["\u041F\u043E\u0433\u043E\u0432\u043E\u0440\u0438\u0442\u044C \u0441 \u041C\u0430\u0440\u0435\u043D","\u041F\u043E\u0433\u043E\u0432\u043E\u0440\u0438\u0442\u044C \u0441 \u041F\u0438\u043F","\u041F\u043E\u0433\u043E\u0432\u043E\u0440\u0438\u0442\u044C \u0441 \u0413\u044D\u0440\u0440\u043E\u0443","\u041F\u0440\u043E\u0447\u0435\u0441\u0442\u044C: \u041F\u043E\u043B\u0435\u0432\u044B\u0435 \u0437\u0430\u043F\u0438\u0441\u0438 \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u044F","\u0412\u0435\u0440\u043D\u0443\u0442\u044C\u0441\u044F \u043A \u043E\u0433\u043D\u044E \u043F\u043E\u0437\u0436\u0435"]},maren_c:{title:"\u041C\u0430\u0440\u0435\u043D",text:"\u041C\u0430\u0440\u0435\u043D \u0431\u0435\u0440\u0451\u0442 \u0432\u0430\u0448\u0438 \u0440\u0443\u043A\u0438 \u0432 \u043E\u0431\u0435 \u0441\u0432\u043E\u0438, \u0447\u0435\u0433\u043E \u043D\u0435 \u0434\u0435\u043B\u0430\u043B\u0430 \u043F\u0440\u0435\u0436\u0434\u0435. \xAB\u0427\u0442\u043E \u0431\u044B \u0442\u0430\u043C \u043D\u0438 \u043D\u043E\u0441\u0438\u043B\u043E \u0441\u0442\u0430\u0440\u043E\u0433\u043E \u043A\u043E\u0440\u043E\u043B\u044F \u2014 \u043E\u043D\u043E \u043A\u043E\u0433\u0434\u0430-\u0442\u043E \u0431\u044B\u043B\u043E \u0447\u0435\u043B\u043E\u0432\u0435\u043A\u043E\u043C. \u041A\u0430\u043A \u0438 \u0442\u0435, \u043A\u043E\u0433\u043E \u0432\u044B \u0443\u043F\u043E\u043A\u043E\u0438\u043B\u0438 \u043F\u043E \u043F\u0443\u0442\u0438\xBB. \u0415\u0451 \u0445\u0432\u0430\u0442\u043A\u0430 \u043A\u0440\u0435\u043F\u043D\u0435\u0442. \xAB\u041F\u043E\u043C\u043D\u0438\u0442\u0435 \u044D\u0442\u043E. \u041D\u0435 \u0447\u0442\u043E\u0431\u044B \u043F\u043E\u0449\u0430\u0434\u0438\u0442\u044C \u0435\u0433\u043E. \u0410 \u0447\u0442\u043E\u0431\u044B \u043D\u0435 \u043F\u043E\u0442\u0435\u0440\u044F\u0442\u044C \u0441\u0435\u0431\u044F, \u0434\u0435\u043B\u0430\u044F \u0442\u043E, \u0447\u0442\u043E \u0434\u043E\u043B\u0436\u043D\u043E\xBB. \u041E\u043D\u0430 \u043E\u0442\u043F\u0443\u0441\u043A\u0430\u0435\u0442. \xAB\u0422\u0435\u043F\u0435\u0440\u044C \u0438\u0434\u0438\u0442\u0435. \u0423 \u043C\u0435\u043D\u044F \u0431\u043E\u043B\u044C\u043D\u044B\u0435\xBB.",choices:["\u041E\u0442\u043E\u0439\u0442\u0438"]},pip_c:{title:"\u041F\u0438\u043F",text:"\u041F\u0438\u043F \u0432\u043A\u043B\u0430\u0434\u044B\u0432\u0430\u0435\u0442 \u0432\u0430\u043C \u0432 \u043B\u0430\u0434\u043E\u043D\u044C \u0447\u0442\u043E-\u0442\u043E: \u0433\u043B\u0430\u0434\u043A\u0438\u0439 \u043A\u0430\u043C\u0435\u0448\u0435\u043A, \u0440\u0430\u0441\u043F\u0438\u0441\u0430\u043D\u043D\u044B\u0439 \u043A\u0440\u0438\u0432\u043E\u0431\u043E\u043A\u0438\u043C \u0436\u0451\u043B\u0442\u044B\u043C \u0441\u043E\u043B\u043D\u0446\u0435\u043C. \xAB\u042D\u0442\u043E \u0443\u0434\u0430\u0447\u0430. \u042F \u0441\u0430\u043C\u0430 \u0441\u0434\u0435\u043B\u0430\u043B\u0430\xBB. \u0415\u0451 \u0445\u0440\u0430\u0431\u0440\u043E\u0441\u0442\u044C \u0434\u0440\u043E\u0436\u0438\u0442, \u043F\u043E\u0442\u043E\u043C \u0434\u0435\u0440\u0436\u0438\u0442\u0441\u044F. \xAB\u041A\u043E\u0433\u0434\u0430 \u0432\u044B \u043F\u043E\u0433\u0430\u0441\u0438\u0442\u0435 \u043F\u043B\u043E\u0445\u0443\u044E \u043A\u043E\u0440\u043E\u043D\u0443, \u0437\u0435\u043B\u0451\u043D\u043E\u0435 \u0432\u0435\u0440\u043D\u0451\u0442\u0441\u044F. \u041F\u0430\u043F\u043A\u0430 \u0433\u043E\u0432\u043E\u0440\u0438\u043B. \u0422\u0430\u043A \u0447\u0442\u043E \u0432\u044B \u0434\u043E\u043B\u0436\u043D\u044B \u2014 \u0447\u0442\u043E\u0431\u044B \u0437\u0435\u043B\u0451\u043D\u043E\u0435 \u0432\u0435\u0440\u043D\u0443\u043B\u043E\u0441\u044C\xBB. \u0412\u044B \u043E\u0431\u0435\u0449\u0430\u0435\u0442\u0435. \u042D\u0442\u043E \u0441\u0430\u043C\u043E\u0435 \u043B\u0451\u0433\u043A\u043E\u0435 \u0438 \u0441\u0430\u043C\u043E\u0435 \u0442\u044F\u0436\u0451\u043B\u043E\u0435 \u043E\u0431\u0435\u0449\u0430\u043D\u0438\u0435, \u0447\u0442\u043E \u0432\u044B \u0434\u0430\u0432\u0430\u043B\u0438.",choices:["\u0421\u0436\u0430\u0442\u044C \u043A\u0430\u043C\u0435\u0448\u0435\u043A \u0432 \u043B\u0430\u0434\u043E\u043D\u0438"]},garrow_c:{title:"\u0413\u044D\u0440\u0440\u043E\u0443",text:"\u0413\u044D\u0440\u0440\u043E\u0443 \u0441\u0442\u043E\u0438\u0442, \u043A\u043E\u0433\u0434\u0430 \u0432\u044B \u0435\u0433\u043E \u043D\u0430\u0445\u043E\u0434\u0438\u0442\u0435, \u2014 \u043F\u0440\u044F\u043C\u043E, \u043D\u0430 \u0431\u043E\u043B\u044C\u043D\u043E\u0439 \u043D\u043E\u0433\u0435, \u0447\u0438\u0441\u0442\u044B\u043C \u0443\u043F\u0440\u044F\u043C\u0441\u0442\u0432\u043E\u043C. \xAB\u041C\u0430\u0440\u0448\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u043D\u0435 \u043C\u043E\u0433\u0443. \u0422\u0430\u043A \u0447\u0442\u043E \u0431\u0443\u0434\u0443 \u0434\u0435\u0440\u0436\u0430\u0442\u044C \u0434\u0432\u0435\u0440\u044C \u0437\u0434\u0435\u0441\u044C, \u043F\u043E\u043A\u0430 \u0432\u044B \u043D\u0435 \u0432\u0435\u0440\u043D\u0451\u0442\u0435\u0441\u044C \u2014 \u0438\u043B\u0438 \u043F\u043E\u043A\u0430 \u043C\u0435\u043D\u044F \u043D\u0435 \u0441\u0442\u0430\u043D\u0435\u0442\xBB. \u041E\u043D \u0441\u0436\u0438\u043C\u0430\u0435\u0442 \u0432\u0430\u0448\u0435 \u043F\u0440\u0435\u0434\u043F\u043B\u0435\u0447\u044C\u0435 \u0445\u0432\u0430\u0442\u043A\u043E\u0439 \u0441\u043E\u043B\u0434\u0430\u0442\u0430, \u044F\u0440\u043E\u0441\u0442\u043D\u043E\u0439 \u0438 \u043A\u0440\u0430\u0442\u043A\u043E\u0439. \xAB\u041F\u043E\u0433\u0430\u0441\u0438\u0442\u0435 \u044D\u0442\u043E, \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u044C. \u0417\u0430 \u0442\u0435\u0445, \u043A\u0442\u043E \u0431\u0435\u0436\u0430\u043B, \u0438 \u0437\u0430 \u0442\u0435\u0445, \u043A\u0442\u043E \u043E\u0441\u0442\u0430\u043B\u0441\u044F\xBB. \u041F\u043E\u0442\u043E\u043C \u043E\u043D \u0442\u044F\u0436\u0435\u043B\u043E \u0441\u0430\u0434\u0438\u0442\u0441\u044F, \u0441\u043C\u043E\u0442\u0440\u0438\u0442 \u0432 \u043E\u0433\u043E\u043D\u044C \u0438 \u0431\u043E\u043B\u044C\u0448\u0435 \u043D\u0435 \u0433\u043E\u0432\u043E\u0440\u0438\u0442 \u043D\u0438 \u0441\u043B\u043E\u0432\u0430.",choices:["\u041E\u0441\u0442\u0430\u0432\u0438\u0442\u044C \u0435\u043C\u0443 \u0434\u043E\u0437\u043E\u0440"]},epilogue:{title:"\u041A\u043E\u0440\u043E\u043D\u0430 \u0433\u0430\u0441\u043D\u0435\u0442",text:`\u0421\u0435\u0440\u0430\u044F \u043A\u043E\u0440\u043E\u043D\u0430 \u0442\u0440\u0435\u0441\u043A\u0430\u0435\u0442\u0441\u044F, \u043A\u0430\u043A \u0440\u0435\u0447\u043D\u043E\u0439 \u043B\u0451\u0434, \u0438 \u0445\u043E\u043B\u043E\u0434\u043D\u044B\u0439 \u043E\u0433\u043E\u043D\u044C \u0443\u0433\u0430\u0441\u0430\u0435\u0442. \u041F\u043E\u043B\u044B\u0439 \u041A\u043E\u0440\u043E\u043B\u044C \u0432\u0437\u0434\u044B\u0445\u0430\u0435\u0442 \u2014 \u043F\u043E\u0447\u0442\u0438 \u0431\u043B\u0430\u0433\u043E\u0434\u0430\u0440\u043D\u043E \u2014 \u0438 \u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u0441\u044F \u043D\u0430\u043A\u043E\u043D\u0435\u0446 \u043B\u0438\u0448\u044C \u043C\u0451\u0440\u0442\u0432\u044B\u043C \u0447\u0435\u043B\u043E\u0432\u0435\u043A\u043E\u043C \u043D\u0430 \u0442\u0440\u043E\u043D\u0435 \u0438\u0437 \u043A\u043E\u0440\u043D\u0435\u0439. \u0421\u0432\u0435\u0440\u0448\u0438\u043B\u043E\u0441\u044C.

\u0412 \u0434\u043E\u043B\u0433\u043E\u0439 \u0442\u0438\u0448\u0438\u043D\u0435 \u043F\u043E\u0441\u043B\u0435, \u043F\u0440\u0435\u0436\u0434\u0435 \u0447\u0435\u043C \u043F\u043E\u0432\u0435\u0440\u043D\u0443\u0442\u044C \u043A \u0434\u043E\u043C\u0443, \u0432\u0430\u0448\u0438 \u043C\u044B\u0441\u043B\u0438 \u0432\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u044E\u0442\u0441\u044F \u043F\u043E \u0434\u043E\u0440\u043E\u0433\u0435, \u0447\u0442\u043E \u043F\u0440\u043E\u043D\u0435\u0441\u043B\u0430 \u0432\u0430\u0441 \u041A\u043B\u044F\u0442\u0432\u0430, \u2014 \u043A \u043C\u0435\u0441\u0442\u0430\u043C, \u0447\u0442\u043E \u0432\u044B \u043F\u0440\u043E\u0448\u043B\u0438, \u043A \u0442\u0435\u043C, \u043A\u043E\u0433\u043E \u043D\u0435 \u0441\u043C\u043E\u0433\u043B\u0438 \u0441\u043F\u0430\u0441\u0442\u0438, \u0438 \u043A \u0442\u0435\u043C \u043D\u0435\u043C\u043D\u043E\u0433\u0438\u043C, \u043A\u043E\u0433\u043E \u0441\u043C\u043E\u0433\u043B\u0438.`,choices:["\u0412\u0441\u043F\u043E\u043C\u043D\u0438\u0442\u044C \u041C\u043E\u0440\u043E\u0437\u043D\u044B\u0439 \u043B\u0435\u0441","\u0412\u0441\u043F\u043E\u043C\u043D\u0438\u0442\u044C \u0413\u043D\u0438\u043B\u043E\u0442\u043E\u043F\u044C","\u0412\u0441\u043F\u043E\u043C\u043D\u0438\u0442\u044C \u0442\u0440\u043E\u0438\u0445, \u0431\u0435\u0436\u0430\u0432\u0448\u0438\u0445 \u043D\u0430 \u044E\u0433","\u0414\u0430\u0442\u044C \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u0435\u043C\u0443 \u0437\u0435\u043B\u0451\u043D\u043E\u043C\u0443 \u0440\u0430\u0441\u0442\u0438"]},ep_rime:{title:"\u041C\u043E\u0440\u043E\u0437\u043D\u044B\u0439 \u043B\u0435\u0441 \u043F\u043E\u043C\u043D\u0438\u0442",text:"\u041D\u0430 \u0432\u043E\u0441\u0442\u043E\u043A\u0435, \u0432 \u043B\u0435\u0441\u0443, \u0447\u0442\u043E \u0442\u0435\u043F\u0435\u0440\u044C \u043B\u0438\u0448\u044C \u0445\u043E\u043B\u043E\u0434\u0435\u043D \u0438 \u0431\u043E\u043B\u044C\u0448\u0435 \u043D\u0435 \u0436\u0435\u0441\u0442\u043E\u043A, \u0437\u0430\u043C\u0451\u0440\u0437\u0448\u0438\u0435 \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u0438 \u043D\u0430\u043A\u043E\u043D\u0435\u0446 \u043E\u043F\u0443\u0441\u0442\u0438\u043B\u0438\u0441\u044C \u0432 \u0434\u043E\u043B\u0436\u043D\u044B\u0439 \u043F\u043E\u043A\u043E\u0439, \u0438 \u0434\u043E\u043B\u0433\u0438\u0439 \u0434\u043E\u0437\u043E\u0440 \u043A\u0430\u043F\u0438\u0442\u0430\u043D\u0430 \u0412\u0430\u0440\u043D \u043E\u043A\u043E\u043D\u0447\u0435\u043D. \u0421\u0442\u0430\u0440\u044B\u0439 \u0425\u0435\u0441\u043A\u0435\u043D, \u0433\u043E\u0432\u043E\u0440\u044F\u0442, \u0432\u043F\u0435\u0440\u0432\u044B\u0435 \u0437\u0430 \u0433\u043E\u0434 \u0441\u043F\u0438\u0442 \u043D\u043E\u0447\u044C \u043D\u0430\u043F\u0440\u043E\u043B\u0451\u0442. \u0417\u0438\u043C\u0430 \u0435\u0449\u0451 \u043F\u0440\u0438\u0434\u0451\u0442 \u0442\u0443\u0434\u0430 \u2014 \u043D\u043E \u043B\u0438\u0448\u044C \u0437\u0438\u043C\u0430, \u0430 \u044D\u0442\u043E \u0442\u043E, \u0447\u0442\u043E \u043A\u043E\u043D\u0447\u0430\u0435\u0442\u0441\u044F.",choices:["\u0414\u0430\u0442\u044C \u043F\u0430\u043C\u044F\u0442\u0438 \u0443\u043B\u0435\u0447\u044C\u0441\u044F"]},ep_fen:{title:"\u0413\u043D\u0438\u043B\u043E\u0442\u043E\u043F\u044C \u0437\u0430\u0442\u0438\u0445\u0430\u0435\u0442",text:"\u041D\u0430 \u044E\u0433\u0435 \u0438 \u0437\u0430\u043F\u0430\u0434\u0435 \u0441\u043F\u043E\u0440\u043E\u0432\u044B\u0439 \u0441\u0432\u0435\u0442 \u0443\u0433\u0430\u0441 \u0432 \u0442\u043E\u043F\u0438, \u0438 \u041C\u0430\u0442\u0443\u0448\u043A\u0430 \u0412\u0438\u0441\u0442\u0430 \u0441\u043F\u0438\u0442 \u0442\u0430\u043C, \u0433\u0434\u0435 \u0440\u043E\u0441\u043B\u0438 \u0435\u0451 \u0441\u0430\u0434\u044B, \u2014 \u0441\u043D\u043E\u0432\u0430 \u0441\u0442\u0430\u0440\u0430\u044F \u0436\u0435\u043D\u0449\u0438\u043D\u0430, \u0438 \u0432 \u043F\u043E\u043A\u043E\u0435. \u0427\u0451\u0440\u043D\u044B\u0435 \u043E\u043C\u0443\u0442\u044B \u0442\u0435\u043F\u0435\u0440\u044C \u043B\u0438\u0448\u044C \u0432\u043E\u0434\u0430. \u0413\u0434\u0435-\u0442\u043E \u0432 \u0442\u0440\u043E\u0441\u0442\u043D\u0438\u043A\u0435 \u043B\u044F\u0433\u0443\u0448\u043A\u0430, \u043F\u0435\u0440\u0432\u043E\u0435 \u0436\u0438\u0432\u043E\u0435 \u0437\u0430 \u0441\u0435\u0437\u043E\u043D, \u043E\u0441\u043C\u0435\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043F\u043E\u0434\u0430\u0442\u044C \u0433\u043E\u043B\u043E\u0441 \u0432\u043E \u0442\u044C\u043C\u0443 \u2014 \u0438 \u0435\u0439 \u043E\u0442\u0432\u0435\u0447\u0430\u044E\u0442.",choices:["\u0414\u0430\u0442\u044C \u043F\u0430\u043C\u044F\u0442\u0438 \u0443\u043B\u0435\u0447\u044C\u0441\u044F"]},ep_unhollowed:{title:"\u041F\u043E\u0441\u043B\u0435\u0434\u043D\u044F\u044F \u0441\u0442\u0440\u0430\u043D\u0438\u0446\u0430",text:"\u0410 \u0432 \u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443, \u043A\u043E\u0433\u0434\u0430 \u0432\u044B \u0440\u0430\u0441\u0441\u043A\u0430\u0437\u044B\u0432\u0430\u0435\u0442\u0435 \u0435\u0439, \u041C\u0430\u0440\u0435\u043D \u0432\u043F\u0438\u0441\u044B\u0432\u0430\u0435\u0442 \u0442\u0440\u0438 \u0438\u043C\u0435\u043D\u0438 \u0432 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u044E\u044E \u0433\u0440\u0430\u0444\u0443 \u043A\u043D\u0438\u0433\u0438 \u2014 \u0440\u0435\u0437\u0447\u0438\u0446\u0443 \u0442\u0440\u043E\u0441\u0442\u043D\u0438\u043A\u0430 \u0438 \u0435\u0451 \u0434\u0435\u0432\u043E\u0447\u043A\u0443, \u043F\u0438\u043B\u0438\u0433\u0440\u0438\u043C\u0430, \u0412\u0438\u043A, \u0447\u0442\u043E \u0434\u0435\u043B\u0430\u043B\u0430 \u0441\u0432\u0435\u0447\u0438, \u2014 \u0438 \u043F\u043E\u0434\u043B\u0435 \u043A\u0430\u0436\u0434\u043E\u0433\u043E, \u0432\u043C\u0435\u0441\u0442\u043E \u0442\u043E\u0433\u043E \u0433\u043E\u043B\u043E\u0433\u043E \u0441\u043B\u043E\u0432\u0430 \xAB\u044E\u0433\xBB, \u043E\u043D\u0430 \u043F\u0438\u0448\u0435\u0442, \u0447\u0442\u043E \u0441 \u043D\u0438\u043C\u0438 \u0441\u0442\u0430\u043B\u043E\u0441\u044C. \u0423 \u043C\u0451\u0440\u0442\u0432\u044B\u0445 \u0435\u0441\u0442\u044C \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u044F\u044F \u0441\u0442\u0440\u0430\u043D\u0438\u0446\u0430. \u042D\u0442\u043E \u043D\u0435\u043C\u043D\u043E\u0433\u043E. \u042D\u0442\u043E \u0432\u0441\u0451, \u043E \u0447\u0451\u043C \u043E\u043D\u0430 \u043F\u0440\u043E\u0441\u0438\u043B\u0430.",choices:["\u0414\u0430\u0442\u044C \u043F\u0430\u043C\u044F\u0442\u0438 \u0443\u043B\u0435\u0447\u044C\u0441\u044F"]},ending_victory:{title:"\u041A\u043E\u0440\u043E\u043D\u0430 \u0433\u0430\u0441\u043D\u0435\u0442",text:`\u0421\u0435\u0440\u0430\u044F \u043A\u043E\u0440\u043E\u043D\u0430 \u0442\u0440\u0435\u0441\u043A\u0430\u0435\u0442\u0441\u044F, \u043A\u0430\u043A \u0440\u0435\u0447\u043D\u043E\u0439 \u043B\u0451\u0434, \u0438 \u0445\u043E\u043B\u043E\u0434\u043D\u044B\u0439 \u043E\u0433\u043E\u043D\u044C \u0443\u0433\u0430\u0441\u0430\u0435\u0442. \u041F\u043E\u043B\u044B\u0439 \u041A\u043E\u0440\u043E\u043B\u044C \u0432\u0437\u0434\u044B\u0445\u0430\u0435\u0442 \u2014 \u043F\u043E\u0447\u0442\u0438 \u0431\u043B\u0430\u0433\u043E\u0434\u0430\u0440\u043D\u043E \u2014 \u0438 \u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u0441\u044F \u043D\u0430\u043A\u043E\u043D\u0435\u0446 \u043B\u0438\u0448\u044C \u043C\u0451\u0440\u0442\u0432\u044B\u043C \u0447\u0435\u043B\u043E\u0432\u0435\u043A\u043E\u043C \u043D\u0430 \u0442\u0440\u043E\u043D\u0435 \u0438\u0437 \u043A\u043E\u0440\u043D\u0435\u0439.

\u0414\u0430\u043B\u0435\u043A\u043E \u043D\u0430 \u0441\u0435\u0432\u0435\u0440\u0435, \u0432 \u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443, \u0442\u043E\u0440\u0444\u044F\u043D\u043E\u0439 \u043E\u0433\u043E\u043D\u044C \u0433\u043E\u0440\u0438\u0442 \u0447\u0443\u0442\u044C \u0442\u0435\u043F\u043B\u0435\u0435, \u0438 \u043F\u0435\u0440\u0432\u043E\u0435 \u0437\u0430 \u0433\u043E\u0434 \u0437\u0435\u043B\u0451\u043D\u043E\u0435 \u043F\u0440\u043E\u0431\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u0441\u043A\u0432\u043E\u0437\u044C \u043F\u0435\u043F\u0435\u043B. \u041A\u043B\u044F\u0442\u0432\u0430 \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u0435\u0439 \u0441\u0434\u0435\u0440\u0436\u0430\u043D\u0430.

014 the Hollowing \u2014 crept out from his crown. Crops turned to ash. The dead would not stay dead.

You four are the last of the Wardens' Oath: sworn to walk into the rot and put out the crown's grey fire. The road south begins at the ruined waystation of Greyhollow.`,choices:[{text:"Begin the journey",goto:"town1"}]},town1:{id:"town1",title:"Greyhollow Waystation",art:"\u{1F3DA}\uFE0F",text:"A handful of survivors huddle around a peat fire. A crook-backed apothecary has set up a stall of salves and oddments, and the old stable still has dry straw to sleep on. South, the Sunken Road drowns into mist.",onEnter:{startQuest:"hollow-crown",unlockLore:"the-hollowing"},choices:[{text:"Visit the apothecary (Shop)",shop:!0},{text:"Ask Maren about the folk who fled south",goto:"town1_missing",hideIfFlag:"q_unhollowed"},{text:"Forage the waystation for moonherb",gather:!0,effects:{giveItems:["mat-moonherb","mat-moonherb"],setFlag:"gather_town1"},hideIfFlag:"gather_town1"},{text:"Rest at the stable \u2014 heal the party (20 gold)",rest:!0},{text:"Sit with the survivors a while",goto:"commons1"},{text:"Take the Sunken Road south",goto:"road1"}]},town1_missing:{id:"town1_missing",title:"Maren's Worry",art:"\u{1F56F}\uFE0F",text:"The apothecary straightens with a wince \u2014 Maren, the survivors call her. 'Before your Oath ever reached us, three of ours lost their nerve and ran south, thinking the rot ran thinner that way. The reed-cutter and her girl. A pilgrim, half-sick already. And Wick, who made our candles thirty winters.' She presses a dried sprig of moonherb into your hand. 'If you find them out there \u2014 and you will, the road keeps everything \u2014 do for them what I couldn't. That's the whole of what I ask.'",onEnter:{startQuest:"the-unhollowed",unlockLore:"maren-of-greyhollow",setFlag:"q_unhollowed"},choices:[{text:"Give Maren your word",goto:"town1"}]},road1:{id:"road1",title:"The Sunken Road",art:"\u{1F32B}\uFE0F",text:"Black water laps at a causeway of broken stone. Something pale skitters away into the reeds \u2014 then more of them turn, and come back hungry.",choices:[{text:"Examine the drowning causeway underfoot",effects:{unlockLore:"the-old-kings-road",setFlag:"exm_road1"},hideIfFlag:"exm_road1"},{text:"Stand and fight",combat:{enemies:["hollow-rat","hollow-rat","rot-crawler"],victoryNode:"road2"}}]},road2:{id:"road2",title:"The Drowned Wagon",art:"\u{1F6D2}",text:"A merchant's wagon lies half-sunk in the mire, its strongbox glinting beneath the murk. The wood is rotten and the water deeper than it looks.",choices:[{text:"Study the wreck for traps and footing (Wits, DC 13)",check:{attr:"wits",dc:13,successNode:"road2_loot",failNode:"road2_ambush"}},{text:"Force the strongbox open by main strength (Might, DC 14)",check:{attr:"might",dc:14,successNode:"road2_loot",failNode:"road2_ambush"}},{text:"Salvage scrap metal from the wreck",gather:!0,effects:{giveItems:["mat-iron-scrap","mat-iron-scrap"],setFlag:"gather_road2"},hideIfFlag:"gather_road2"},{text:"A child's reed-doll snags your boot \u2014 follow the trail",goto:"road_lost",requiresFlag:"q_unhollowed",hideIfFlag:"found_road"},{text:"Read the waybills in the drowned wagon",effects:{unlockLore:"the-salt-caravans",setFlag:"exm_road2"},hideIfFlag:"exm_road2"},{text:"Leave it and press on",goto:"road3"}]},road_lost:{id:"road_lost",title:"The Reed Mother",art:"\u{1FABA}",text:"The trail of small dropped things ends at a half-sunk coracle. The reed-cutter sits in the black water with her girl held close \u2014 both gone grey and still, hollowed mid-embrace. They do not rise to fight you; the rot left them only this last shape. You work the reed-doll free from the child's hand, lay the two of them down beneath the reeds where the current won't take them, and stand a moment in the cold before you can go on.",onEnter:{setFlag:"found_road",gold:20,giveItems:["potion-major"],unlockLore:"the-reed-mother"},choices:[{text:"Return to the wreck",goto:"road2"}]},road2_loot:{id:"road2_loot",title:"A Lucky Find",art:"\u{1F4B0}",text:"You work the box free without disturbing the muck. Inside: coin, and a vial that smells of copper and life.",onEnter:{gold:45,giveItems:["potion-major"]},choices:[{text:"Pocket it and move on",goto:"road3"}]},road2_ambush:{id:"road2_ambush",title:"Sprung!",art:"\u{1FAA4}",text:"The wagon shifts \u2014 and husks that were hiding beneath it rise out of the water, blades drawn.",choices:[{text:"Fight!",combat:{enemies:["husk-bandit","husk-bandit","rot-crawler"],victoryNode:"road3"}}]},road3:{id:"road3",title:"The Toll Bridge",art:"\u{1F309}",text:"A collapsed gatehouse blocks the bridge. You could heave the rubble aside, or slip along the slick ledge around it \u2014 one wrong step into the current, though.",choices:[{text:"Clear the rubble together (Might, DC 12)",check:{attr:"might",dc:12,successNode:"road3_clear",failNode:"road3_hurt"}},{text:"Edge around on the ledge (Agility, DC 13)",check:{attr:"agility",dc:13,successNode:"road3_clear",failNode:"road3_hurt"}}]},road3_clear:{id:"road3_clear",title:"Across",art:"\u2705",text:"You make it across without a scratch and catch your breath on the far bank.",choices:[{text:"Press toward the chapel bell",goto:"road_boss"}]},road3_hurt:{id:"road3_hurt",title:"A Hard Crossing",art:"\u{1FA79}",text:"Someone slips; the current drags before you haul them out, soaked and battered. You cross, but worse for wear.",onEnter:{healPercent:-15},choices:[{text:"Press toward the chapel bell",goto:"road_boss"}]},road_boss:{id:"road_boss",title:"The Warden of Thorns",art:"\u{1F33F}",text:"At the end of the road, a thing of bramble and bone unfolds from the ruined shrine \u2014 the Hollowing wearing a dead druid like a glove. It was a Warden once, like you. It remembers the Oath, and hates it.",onEnter:{startQuest:"warden-of-thorns"},choices:[{text:"End its suffering",combat:{enemies:["warden-of-thorns"],victoryNode:"road_clear"}}]},road_clear:{id:"road_clear",title:"First Light",art:"\u{1F305}",text:"The bramble-thing comes apart into ordinary thorns, and for a moment the mist thins. Among its roots: a phoenix tear, and the way south to the Drowned Chapel. There's time to return to Greyhollow first.",onEnter:{xp:30,completeQuest:"warden-of-thorns",unlockLore:"wardens-oath"},choices:[{text:"Return to Greyhollow",goto:"town2"},{text:"Push on to the Drowned Chapel",goto:"chapel1"}]},town2:{id:"town2",title:"Greyhollow Waystation",art:"\u{1F3DA}\uFE0F",text:"Word of the Warden's fall has spread; the survivors look at you with something like hope. The apothecary has restocked.",choices:[{text:"Visit the apothecary (Shop)",shop:!0},{text:"Rest at the stable \u2014 heal the party (20 gold)",rest:!0},{text:"Brave the Rimewood (optional)",goto:"rime_enter"},{text:"Descend into the Blightfen (optional)",goto:"fen_enter"},{text:"Sit with the survivors a while",goto:"commons2"},{text:"Travel to the Drowned Chapel",goto:"chapel1"}]},chapel1:{id:"chapel1",title:"The Drowned Chapel",art:"\u26EA",text:"The chapel has sunk to its windows in black water. Candlelight moves behind the glass though no living hand could light it. Pale acolytes drift between the pews, chanting to the crown.",onEnter:{startQuest:"drowned-faithful"},choices:[{text:"Examine the waterlogged hymnal in a pew",effects:{unlockLore:"the-drowned-faith",setFlag:"exm_chapel1"},hideIfFlag:"exm_chapel1"},{text:"Cut through the congregation",combat:{enemies:["pale-acolyte","pale-acolyte","bog-lurker"],victoryNode:"chapel2"}}]},chapel2:{id:"chapel2",title:"The Reliquary",art:"\u{1F56F}\uFE0F",text:"Behind the altar, a locked reliquary hums with warded power. The lock is a puzzle of brass rings; the wards will bite the careless.",choices:[{text:"Pick the warded lock (Agility, DC 14)",check:{attr:"agility",dc:14,successNode:"chapel2_loot",failNode:"chapel2_zap"}},{text:"Unravel the wards by lore (Wits, DC 15)",check:{attr:"wits",dc:15,successNode:"chapel2_loot",failNode:"chapel2_zap"}},{text:"Pry a bone charm from the reliquary frame",gather:!0,effects:{giveItems:["mat-bone-charm","mat-moonherb"],setFlag:"gather_chapel2"},hideIfFlag:"gather_chapel2"},{text:"A muffled prayer behind a collapsed pew \u2014 investigate (Spirit, DC 13)",check:{attr:"spirit",dc:13,successNode:"chapel_lost_save",failNode:"chapel_lost_late"},requiresFlag:"q_unhollowed",hideIfFlag:"found_chapel"},{text:"Study the warding on the reliquary frame",effects:{unlockLore:"the-reliquary-saint",setFlag:"exm_chapel2"},hideIfFlag:"exm_chapel2"},{text:"Ignore it and find the bishop",goto:"chapel_boss"}]},chapel_lost_save:{id:"chapel_lost_save",title:"A Voice Still Human",art:"\u{1F64F}",text:"Behind the fallen pew crouches an old man \u2014 the pilgrim, thin and fevered but himself, his eyes clearing from terror to weeping as he understands you are warm, and living, and kind. He cannot walk the road at your side, but you give him your spare salve, a lit brand, and the bearing north to Greyhollow and Maren's fire. 'Tell her,' he whispers, gripping your sleeve, 'tell her one of us came back.' It is not much, against all of this. Out here, it is everything.",onEnter:{setFlag:"found_chapel",gold:25,giveItems:["phoenix-tear"],unlockLore:"the-last-pilgrim"},choices:[{text:"Return to the reliquary",goto:"chapel2"}]},chapel_lost_late:{id:"chapel_lost_late",title:"Too Late by an Hour",art:"\u{1F56F}\uFE0F",text:"You reach the pilgrim just as the grey is reaching him \u2014 far enough gone that there is no calling him back, near enough that he knows your face for a kind one. You hold his hand while the light goes out of him cleanly, before the Hollowing can finish its work and make him walk. A mercy, and a small one, and the only one the chapel left to give.",onEnter:{setFlag:"found_chapel",gold:15,unlockLore:"the-last-pilgrim"},choices:[{text:"Return to the reliquary",goto:"chapel2"}]},chapel2_loot:{id:"chapel2_loot",title:"The Reliquary Opens",art:"\u{1F4FF}",text:"The rings click home and the wards sigh out. Within: a runed vest and a purse of old coin.",onEnter:{gold:60,giveItems:["arm-runed-vest"]},choices:[{text:"Seek the bishop",goto:"chapel_boss"}]},chapel2_zap:{id:"chapel2_zap",title:"Warded!",art:"\u26A1",text:"The wards discharge in a sheet of cold fire. The reliquary stays shut, and you stagger back smarting.",onEnter:{healPercent:-12},choices:[{text:"Seek the bishop",goto:"chapel_boss"}]},chapel_boss:{id:"chapel_boss",title:"The Pale Bishop",art:"\u2626\uFE0F",text:"At the flooded altar stands the Pale Bishop, the Hollow King's mouth in the south. It raises grey hands, and the drowned dead raise their heads. 'Kneel,' it says, with a hundred throats, 'and be hollow, and be at peace.'",onEnter:{unlockLore:"the-pale-bishop"},choices:[{text:"Refuse",combat:{enemies:["the-pale-bishop","pale-acolyte"],victoryNode:"chapel_clear"}}]},chapel_clear:{id:"chapel_clear",title:"The Bell Tolls Once",art:"\u{1F514}",text:"The Bishop folds inward and is gone. Its stormcaller rod clatters to the wet stone, still crackling. North, past the marsh, the Ashen Keep rises black against a sky the color of a bruise \u2014 the Hollow King waits there.",onEnter:{xp:45,giveItems:["wpn-stormrod"],completeQuest:"drowned-faithful"},choices:[{text:"Return to Greyhollow to prepare",goto:"town3"},{text:"March on the Ashen Keep",goto:"keep1"}]},town3:{id:"town3",title:"Greyhollow \u2014 The Last Night",art:"\u{1F525}",text:"The survivors give what they have: a hot meal, a whetstone, a blessing. Everyone knows what marching on the Keep means. The apothecary presses her finest wares on you and will not take no.",choices:[{text:"Visit the apothecary (Shop)",shop:!0},{text:"Rest at the stable \u2014 heal the party (20 gold)",rest:!0},{text:"Sit with the survivors a while",goto:"commons3"},{text:"March on the Ashen Keep",goto:"keep1"}]},keep1:{id:"keep1",title:"The Ashen Keep \u2014 Gatehouse",art:"\u{1F3F0}",text:"Wraith knights stand the gate, grey banners hanging in air that does not move. They lower their lances as one.",onEnter:{startQuest:"silver-of-the-keep"},choices:[{text:"Examine the wraith-knights' frozen banners",effects:{unlockLore:"the-iron-garrison",setFlag:"exm_keep1"},hideIfFlag:"exm_keep1"},{text:"Break through the gate",combat:{enemies:["wraith-knight","wraith-knight"],victoryNode:"keep2"}}]},keep2:{id:"keep2",title:"The Hall of Grey Candles",art:"\u{1F56F}\uFE0F",text:"A long hall of guttering candles. Hollow mages turn from their books, and the air goes thin with old magic. A side passage might let you slip past \u2014 if you're quiet enough.",choices:[{text:"Slip past in the dark (Agility, DC 15)",check:{attr:"agility",dc:15,successNode:"keep3",failNode:"keep2_fight"}},{text:"Loot silver and emberdust from the hall",gather:!0,effects:{giveItems:["mat-silver-ingot","mat-emberdust","mat-silver-ingot"],setFlag:"gather_keep2",completeQuest:"silver-of-the-keep"},hideIfFlag:"gather_keep2"},{text:"A grey figure weeps in a side cell \u2014 approach",goto:"keep_lost",requiresFlag:"q_unhollowed",hideIfFlag:"found_keep"},{text:"Read a hollow mage's open grimoire",effects:{unlockLore:"the-grey-candles",setFlag:"exm_keep2"},hideIfFlag:"exm_keep2"},{text:"Fight through the mages",combat:{enemies:["hollow-mage","hollow-mage","wraith-knight"],victoryNode:"keep3"}}]},keep_lost:{id:"keep_lost",title:"The Candlewright",art:"\u{1F56F}\uFE0F",text:"In a side cell a figure rocks over a guttered candle, trying with grey and clumsy fingers to coax a flame that will not come \u2014 Wick, who lit Greyhollow's winters for thirty years. What's left of her lifts a ruined face toward you. 'Can't,' she says, and it is almost a question, 'can't keep it lit\u2014' and then the Hollowing closes over the last of her, and she comes at you with the candle-iron raised.",choices:[{text:"Give her the light she's chasing",combat:{enemies:["the-candlewright"],victoryNode:"keep_lost_end"}}]},keep_lost_end:{id:"keep_lost_end",title:"A Candle, Snuffed",art:"\u{1F56F}\uFE0F",text:"It is over quickly, and quietly. You set the cold candle back into her stilled hands and leave her looking, almost, at peace. Three sought a thinner rot to the south and found only more of it; you have given all three the only ending the rot left to give. Maren will want to know how their story closed. She will not thank you for it. But she will know \u2014 and the dead will have their last page.",onEnter:{setFlag:"found_keep",completeQuest:"the-unhollowed",gold:30,unlockLore:"the-candlewright"},choices:[{text:"Return to the hall",goto:"keep2"}]},keep2_fight:{id:"keep2_fight",title:"Spotted!",art:"\u{1F441}\uFE0F",text:"A candle gutters at the wrong moment. The mages' heads turn together, eyes full of grey light.",choices:[{text:"No choice but to fight",combat:{enemies:["hollow-mage","hollow-mage"],victoryNode:"keep3"}}]},keep3:{id:"keep3",title:"The Barrow Throne",art:"\u{1F451}",text:`The throne room is a barrow opened to the sky. On a seat of root and bone sits the Hollow King, the grey crown burning cold above his brow. He does not rise. He does not need to.

'You carry the Oath,' he says, and his voice is the Hollowing itself. 'Good. I have been so lonely, and the Oath makes such patient hollows.'

This is what you came for. Rest now, or end it.`,onEnter:{unlockLore:"the-grey-crown"},choices:[{text:"Steady yourselves (Rest \u2014 20 gold)",rest:!0},{text:"Use the moment to ready gear (Shop)",shop:!0},{text:"Put out the grey fire",combat:{enemies:["the-hollow-king"],victoryNode:"epilogue"}}]},rime_enter:{id:"rime_enter",title:"The Rimewood \u2014 Edge",art:"\u{1F332}",text:"The road east climbs into a wood gripped by endless winter. At a lean-to of frozen hide, a one-eyed old soldier named Hesken warms his hands over coals that barely glow. 'Wardens went in a year past,' he rasps. 'None came out. But I hear armor on the wind some nights. Something keeps their watch now. Put it down, would you?'",onEnter:{startQuest:"frozen-vigil",unlockLore:"the-rimewood"},choices:[{text:"Ask Hesken what he saw",goto:"rime_hesken"},{text:"Enter the frozen wood",goto:"rime_path"},{text:"Return to Greyhollow",goto:"town2"}]},rime_hesken:{id:"rime_hesken",title:"Hesken's Tale",art:"\u{1F525}",text:"'Captain Varn led them \u2014 good Wardens, every one. The cold here ain't natural; it's older than the rot, and it don't melt for spring nor fire. They marched to a cairn deep in, where the trees stop. That's where the armor walks.' He spits into the coals. 'Take their blade if you find it. They'd want it used, not buried.'",choices:[{text:"Step into the wood",goto:"rime_path"}]},rime_path:{id:"rime_path",title:"The Frozen Trail",art:"\u2744\uFE0F",text:"Black trunks crowd a trail of blue ice. A frozen river bars the way, a thicket of ice-sheathed bramble to one side, and\u2014half-buried\u2014the corner of a Warden's cache catching the grey light.",choices:[{text:"Cross the frozen river (Agility, DC 13)",check:{attr:"agility",dc:13,successNode:"rime_grove",failNode:"rime_hurt"}},{text:"Break through the frozen thicket (Might, DC 13)",check:{attr:"might",dc:13,successNode:"rime_grove",failNode:"rime_hurt"}},{text:"Dig out the half-buried cache (Wits, DC 14)",check:{attr:"wits",dc:14,successNode:"rime_secret",failNode:"rime_grove"}}]},rime_hurt:{id:"rime_hurt",title:"Through the Cold",art:"\u{1FA79}",text:"The ice gives way; someone goes through to the waist before you haul them out, blue-lipped and shaking. You press on, chilled to the bone.",onEnter:{healPercent:-12},choices:[{text:"Press deeper",goto:"rime_grove"}]},rime_secret:{id:"rime_secret",title:"The Warden's Cache",art:"\u{1F9CA}",text:"Beneath the ice lie cloaks of the Oath, frozen mid-stride, and a captain's journal. You take what they can no longer use \u2014 coin, old silver, and the truth of what happened here.",onEnter:{gold:40,giveItems:["mat-silver-ingot","treasure-ancient-coin"],unlockLore:"the-frozen-wardens"},choices:[{text:"Press deeper",goto:"rime_grove"}]},rime_grove:{id:"rime_grove",title:"The Pale Grove",art:"\u{1F32B}\uFE0F",text:"Frost-wisps drift between the trunks like cold lanterns \u2014 and turn, as one, toward the warmth of the living.",choices:[{text:"Cut through them",combat:{enemies:["frost-wisp","frost-wisp","rime-stalker"],victoryNode:"rime_deep"}}]},rime_deep:{id:"rime_deep",title:"Where the Trees Stop",art:"\u26F0\uFE0F",text:"The wood thins to a clearing of black stone and a cairn ringed with frozen Wardens, still kneeling. The air here hums with cold. Their watcher is near.",choices:[{text:"Chip frozen silver from the dead trees",gather:!0,effects:{giveItems:["mat-silver-ingot","mat-emberdust"],setFlag:"gather_rime"},hideIfFlag:"gather_rime"},{text:"Approach the cairn",combat:{enemies:["frozen-thrall","frozen-thrall","frost-wisp"],victoryNode:"rime_boss"}}]},rime_boss:{id:"rime_boss",title:"The Hoarfrost Knight",art:"\u{1F6E1}\uFE0F",text:"From the cairn rises a figure in rimed plate, a Warden's cloak frozen to its shoulders \u2014 Captain Varn, or what the cold made of her. Frost sheets off the armor as it lifts a blade of blue ice. It keeps the vigil still.",choices:[{text:"Give the vigil its rest",combat:{enemies:["the-hoarfrost-knight"],victoryNode:"rime_clear"}}]},rime_clear:{id:"rime_clear",title:"The Cold Breaks",art:"\u{1F305}",text:"The armor comes apart in a fall of frost, and for the first time in a year the Rimewood is merely cold, not cruel. Winter's Edge lies bright in the snow. The frozen Wardens, freed, sink quietly into rest. Hesken will sleep easier \u2014 and so, perhaps, will you.",onEnter:{xp:40,completeQuest:"frozen-vigil",setFlag:"rimewood_cleared"},choices:[{text:"Return to Greyhollow",goto:"town2"}]},fen_enter:{id:"fen_enter",title:"The Blightfen \u2014 Edge",art:"\u{1FAB5}",text:"The track west sinks into a country of black water and pale fungus. At a hummock of dry peat, an old cutter named Sedge tends a smudge-fire against the spores. 'Mother Wyste set my fever once, years back \u2014 good woman,' he says, not looking up. 'She went in there a season past, chasing a cure for the grey rot. Now there's a thing in a crown of mushrooms keeps her garden. If she's still in there somewhere, the kindest thing is to put it down.'",onEnter:{startQuest:"blighted-roots",unlockLore:"the-blightfen"},choices:[{text:"Ask Sedge what he knows",goto:"fen_sedge"},{text:"Wade into the fen",goto:"fen_path"},{text:"Return to Greyhollow",goto:"town2"}]},fen_sedge:{id:"fen_sedge",title:"Sedge's Telling",art:"\u{1F525}",text:"'She weren't mad, whatever they say. She had a notion the cure for the rot had to be made of rot \u2014 that you fight a poison with a smaller poison. Reckon she was right and reckon it ate her anyway.' He pokes the smudge-fire. 'The crowned thing don't like flame. Stands to reason \u2014 fire's the one thing that ever cleaned this fen. Take a torch to it, if you've the wit.'",choices:[{text:"Step into the fen",goto:"fen_path"}]},fen_path:{id:"fen_path",title:"The Sunken Causeway",art:"\u{1F32B}\uFE0F",text:"A causeway of half-drowned logs threads the pools. Reeds taller than a man crowd one side; on the other, the roofline of a flooded stillroom breaks the water \u2014 Mother Wyste's, perhaps, and worth a look.",choices:[{text:"Pick along the sunken causeway (Agility, DC 13)",check:{attr:"agility",dc:13,successNode:"fen_pools",failNode:"fen_hurt"}},{text:"Force a path through the reeds (Might, DC 13)",check:{attr:"might",dc:13,successNode:"fen_pools",failNode:"fen_hurt"}},{text:"Search the flooded stillroom (Wits, DC 14)",check:{attr:"wits",dc:14,successNode:"fen_secret",failNode:"fen_pools"}}]},fen_hurt:{id:"fen_hurt",title:"Into the Mire",art:"\u{1FA79}",text:"A log rolls underfoot and someone goes in to the chest, coming up coughing and slick with rot before you haul them clear. You press on, fouled and shaken.",onEnter:{healPercent:-12},choices:[{text:"Press deeper",goto:"fen_pools"}]},fen_secret:{id:"fen_secret",title:"The Drowned Stillroom",art:"\u{1F9EA}",text:"The stillroom stands to its windows in black water, jars furred green on their shelves. You take what the fen can't use: coin in a tin, Mother Wyste's good silver shears \u2014 and her journal, which tells you what she became.",onEnter:{gold:40,giveItems:["mat-silver-ingot","treasure-gilded-idol"],unlockLore:"the-lost-herbalist"},choices:[{text:"Press deeper",goto:"fen_pools"}]},fen_pools:{id:"fen_pools",title:"The Spore Pools",art:"\u{1F344}",text:"The causeway opens onto a basin of still pools lit by drifting clouds of spores. Pale shapes uncurl from the muck and the air itself seems to turn toward the warmth of the living.",choices:[{text:"Cut a way through",combat:{enemies:["mire-spore","mire-spore","blight-hound"],victoryNode:"fen_deep"}}]},fen_deep:{id:"fen_deep",title:"Where the Reeds Drown",art:"\u{1F33E}",text:"The reeds thin to a ring of dead willows hung with fat blightcaps, and beyond them a hummock crowned with mushroom and a kneeling shape. Her thralls rise from the water first, to keep the vigil a moment longer.",choices:[{text:"Harvest blightcaps from the dead willows",gather:!0,effects:{giveItems:["mat-blightcap","mat-moonherb"],setFlag:"gather_fen"},hideIfFlag:"gather_fen"},{text:"Approach the crowned figure",combat:{enemies:["plague-thrall","plague-thrall","rot-shaman"],victoryNode:"fen_boss"}}]},fen_boss:{id:"fen_boss",title:"The Rotcrowned",art:"\u{1F451}",text:"On the hummock kneels a figure in a gown of moss and bog-cotton, a crown of pale mushrooms ringing her brow \u2014 Mother Wyste, who walked into the fen to wring a cure from the rot and let the rot answer instead. She lifts a face soft with grey spores and smiles, almost kindly. 'I found it,' she breathes. 'I found the cure. It only costs everything.'",choices:[{text:"Give her the ending she sought (bring fire)",combat:{enemies:["the-rotcrowned"],victoryNode:"fen_clear"}}]},fen_clear:{id:"fen_clear",title:"The Fen Quiets",art:"\u{1F305}",text:"The crown of mushrooms blackens and falls, and Mother Wyste with it \u2014 only an old woman again, at the last, and at rest. The Mirecrown Scepter she carried still hums with the half-thing she nearly made. The spore-light thins; somewhere a frog, the first living thing in a season, dares to call. Sedge will want to know.",onEnter:{xp:45,completeQuest:"blighted-roots",setFlag:"blightfen_cleared"},choices:[{text:"Return to Greyhollow",goto:"town2"}]},commons1:{id:"commons1",title:"Greyhollow Commons",art:"\u{1F525}",text:"Around the peat fire, what's left of Greyhollow makes room for you. There isn't much warmth to share, but they share it anyway. A soot-smudged child watches you with enormous eyes; a lamed man by the wall pointedly does not.",choices:[{text:"Talk with Maren the apothecary",goto:"maren_a"},{text:"Crouch to talk with the child",goto:"pip_a"},{text:"Sit by the lamed guardsman",goto:"garrow_a"},{text:"Read: A Child's Primer of Aldermoor",effects:{unlockLore:"primer-of-aldermoor",setFlag:"read_primer"},hideIfFlag:"read_primer"},{text:"Read: The Greyhollow Ledger",effects:{unlockLore:"greyhollow-ledger",setFlag:"read_ledger"},hideIfFlag:"read_ledger"},{text:"Rejoin the fire later",goto:"town1"}]},maren_a:{id:"maren_a",title:"Maren",art:"\u2697\uFE0F",text:"Maren works a pestle without looking up. 'You want to know if we'll hold till you've done your part. We won't \u2014 not all of us. But some will, and that's more than yesterday's arithmetic allowed.' She nods south. 'Don't carry us in your head out there. Carry the work. Come back if you can.'",choices:[{text:"Step away",goto:"commons1"}]},pip_a:{id:"pip_a",title:"Pip",art:"\u{1F9D2}",text:"The child \u2014 Pip, someone calls her \u2014 sidles close. 'Are you really Wardens? Da said Wardens were just a story, to make us brave.' A beat. 'Is it working? The being brave?' She doesn't wait for an answer, only grips your hand a moment, then bolts back to the fire, satisfied.",choices:[{text:"Stand up",goto:"commons1"}]},garrow_a:{id:"garrow_a",title:"Garrow",art:"\u{1FAA8}",text:"The lamed man is Garrow; he kept this gate before his leg gave out. He won't meet your eye. 'Marched, did you. Walked right in where the rest of us ran.' He spits into the coals. 'Don't mind me. I'd come, if the leg let me \u2014 and we'd both know I was lying.'",choices:[{text:"Leave him to the fire",goto:"commons1"}]},commons2:{id:"commons2",title:"Greyhollow Commons",art:"\u{1F525}",text:"Word of the Warden's fall reached the fire ahead of you. The room is no warmer, but the silence in it has changed \u2014 it is listening now, instead of only waiting. Garrow's old patrol-charm hangs on the nail by the door.",choices:[{text:"Talk with Maren",goto:"maren_b"},{text:"Talk with Pip",goto:"pip_b"},{text:"Talk with Garrow",goto:"garrow_b"},{text:"Take Garrow's patrol-charm from the nail",effects:{giveItems:["trk-warding-eye"],setFlag:"garrow_charm"},hideIfFlag:"garrow_charm"},{text:"Read: The Last Almanac",effects:{unlockLore:"the-last-almanac",setFlag:"read_almanac"},hideIfFlag:"read_almanac"},{text:"Rejoin the fire later",goto:"town2"}]},maren_b:{id:"maren_b",title:"Maren",art:"\u2697\uFE0F",text:"'You put down the thing on the road,' Maren says. 'Folk are saying the mist thinned for an hour. Maybe it did.' She tucks a fresh salve into your pack, unasked. 'Hope's a tool like any other. Don't let it go dull on you. But don't throw it out, either.'",choices:[{text:"Step away",goto:"commons2"}]},pip_b:{id:"pip_b",title:"Pip",art:"\u{1F9D2}",text:"Pip has appointed herself your herald. 'I told everyone you'd win. I TOLD them.' Then, suddenly grave in the way only children manage: 'You're going further, though. To the bad chapel. Will you still come back?' You tell her you'll try. She decides, firmly, that this is a yes.",choices:[{text:"Stand up",goto:"commons2"}]},garrow_b:{id:"garrow_b",title:"Garrow",art:"\u{1FAA8}",text:"Garrow very nearly looks at you. 'Heard what you did.' A long pause \u2014 the nearest thing he has to an apology. 'My patrol-charm's on the nail. Did me no good, but it's good iron. Take it when you go, and don't make a thing of it.' He turns back to the coals before you can.",choices:[{text:"Leave him to the fire",goto:"commons2"}]},commons3:{id:"commons3",title:"Greyhollow Commons \u2014 The Last Night",art:"\u{1F525}",text:"Everyone knows what marching on the Keep means. The fire is banked high tonight, as though warmth could be stored against tomorrow. They have saved you the best places by the coals.",choices:[{text:"Talk with Maren",goto:"maren_c"},{text:"Talk with Pip",goto:"pip_c"},{text:"Talk with Garrow",goto:"garrow_c"},{text:"Read: Field-Notes of a Warden",effects:{unlockLore:"warden-field-notes",setFlag:"read_fieldnotes"},hideIfFlag:"read_fieldnotes"},{text:"Rejoin the fire later",goto:"town3"}]},maren_c:{id:"maren_c",title:"Maren",art:"\u2697\uFE0F",text:"Maren takes your hands in both of hers, which she has never done. 'Whatever's up there wearing the old king \u2014 it was a person once. Same as the things you've laid down on the way.' Her grip tightens. 'Remember that. Not to spare it. So that you don't lose yourself doing what's needful.' She lets go. 'Now go on. I've patients.'",choices:[{text:"Step away",goto:"commons3"}]},pip_c:{id:"pip_c",title:"Pip",art:"\u{1F9D2}",text:"Pip presses something into your palm: a smooth pebble, painted with a lopsided yellow sun. 'It's a luck. I made it myself.' Her bravery wobbles, then holds. 'When you put out the bad crown, the green comes back. Da said. So you have to \u2014 so the green comes back.' You promise. It is the easiest and the hardest promise you have ever made.",choices:[{text:"Close your hand around it",goto:"commons3"}]},garrow_c:{id:"garrow_c",title:"Garrow",art:"\u{1FAA8}",text:"Garrow is standing when you find him \u2014 upright on the bad leg by sheer stubbornness. 'Can't march. So I'll hold the door here till you're back \u2014 or till I'm not.' He clasps your forearm, a soldier's grip, fierce and brief. 'Put it out, Warden. For them as ran, and them as stayed.' Then he sits, hard, and watches the fire, and says nothing more.",choices:[{text:"Leave him the watch",goto:"commons3"}]},epilogue:{id:"epilogue",title:"The Crown Goes Out",art:"\u{1F304}",text:`The grey crown cracks like river ice and the cold fire gutters out. The Hollow King sighs \u2014 almost grateful \u2014 and is, at last, only a dead man on a throne of roots. It is done.

In the long quiet after, before you turn for home, your thoughts go back along the road the Oath carried you \u2014 to the places you passed, and the ones you could not save, and the few you could.`,choices:[{text:"Think of the Rimewood",goto:"ep_rime",requiresFlag:"rimewood_cleared"},{text:"Think of the Blightfen",goto:"ep_fen",requiresFlag:"blightfen_cleared"},{text:"Think of the three who fled south",goto:"ep_unhollowed",requiresFlag:"found_keep"},{text:"Let the last green thing grow",goto:"ending_victory"}]},ep_rime:{id:"ep_rime",title:"The Rimewood Remembers",art:"\u2744\uFE0F",text:"East, in a wood that is only cold now and no longer cruel, the frozen Wardens have sunk at last into proper rest, and Captain Varn's long vigil is ended. Old Hesken, they say, sleeps the night through for the first time in a year. Winter will come there still \u2014 but only winter, which is a thing that ends.",choices:[{text:"Let the memory settle",goto:"epilogue"}]},ep_fen:{id:"ep_fen",title:"The Blightfen Quiets",art:"\u{1F344}",text:"South and west, the spore-light has gone out of the fen, and Mother Wyste sleeps where her gardens grew \u2014 an old woman again, and at peace. The black pools are only water now. Somewhere among the reeds a frog, the first living thing in a season, dares to call into the dark, and is answered.",choices:[{text:"Let the memory settle",goto:"epilogue"}]},ep_unhollowed:{id:"ep_unhollowed",title:"The Last Page",art:"\u{1F56F}\uFE0F",text:"And in Greyhollow, when you tell her, Maren writes three names in the ledger's last column \u2014 the reed-cutter and her girl, the pilgrim, Wick who made the candles \u2014 and beside each, instead of that bare word 'south', she writes what became of them. The dead have their last page. It is not much. It was the whole of what she asked.",choices:[{text:"Let the memory settle",goto:"epilogue"}]},ending_victory:{id:"ending_victory",title:"The Crown Goes Out",art:"\u{1F304}",text:`The grey crown cracks like river ice and the cold fire gutters out. The Hollow King sighs \u2014 almost grateful \u2014 and is, at last, only a dead man on a throne of roots.

Far to the north, in Greyhollow, the peat fire burns a little warmer, and the first green thing in a year pushes up through the ash. The Wardens' Oath is kept.

\u2014 THE END \u2014

{id:"smith-vigil-glaive",name:"Vigil Glaive (set)",station:"smithing",description:"Forge a piece of the Warden's Vigil set.",inputs:[{defId:"mat-silver-ingot",qty:2},{defId:"mat-iron-scrap",qty:3}],output:{defId:"wpn-vigil-glaive",qty:1}},"smith-ember-weave":{id:"smith-ember-weave",name:"Ember Weave (set)",station:"smithing",description:"Weave a piece of the Emberwrought set.",inputs:[{defId:"mat-emberdust",qty:2},{defId:"mat-silver-ingot",qty:1}],output:{defId:"arm-ember-weave",qty:1}}},Ue=Object.values(no);var ro={"the-old-kings-road":{id:"the-old-kings-road",title:"The Old King's Road",text:"The causeway south was the Kingsway once \u2014 laid stone by stone to carry the old king's bier to the barrow beneath the capital, so that no royal foot need ever touch common mud. They finished it the same winter he died. The Hollowing came up that same road, as if it had been built for exactly this, and now the Kingsway drowns a hand's-breadth deeper each year. The water is very black and very patient, and it remembers the weight of a crown."},"the-salt-caravans":{id:"the-salt-caravans",title:"The Salt Caravans",text:"Faded waybills in the drowned wagon: salt and wool going south, ironwork and Greyhollow candles coming north, season on season. The last bill is dated the spring the wheat came up ash. 'Hold the toll for us,' a clerk has scrawled at the bottom, 'we'll settle on the return.' They did not return. The road that fed the south with salt now salts it only with the dead."},"the-drowned-faith":{id:"the-drowned-faith",title:"The Drowned Faith",text:"Before the marsh swallowed it, the chapel kept a gentle creed: that the dead were owed remembrance, and the living owed each other bread. A waterlogged hymnal still holds the old verses \u2014 and, pressed between the last pages in fresh grey ink, a newer line in no language the living should know, sung now by a hundred drowned throats. The crown did not silence the faith. It learned the tune, and changed the words."},"the-reliquary-saint":{id:"the-reliquary-saint",title:"The Warded Reliquary",text:"The brass-ringed reliquary was warded not to keep thieves out but to keep something in: the finger-bone of Saint Illa of the Ford, who legend says walked into a flooding river to carry a child across and did not walk back out. The wards are old water-magic, meant to hold back drowning. They have held, after a fashion, all this time \u2014 which is perhaps why the chapel sank instead of the relic."},"the-iron-garrison":{id:"the-iron-garrison",title:"The Iron Garrison",text:"The wraith-knights at the gate were the Ashen Keep's living garrison once \u2014 three hundred swords sworn to hold the realm's last hard place against any army. No army came. The Hollowing came instead, up through the well-water and the bread, and took them at their posts so quietly that their grey banners never even fell. They hold the gate still. They were always going to hold the gate. That was the whole of the oath they swore."},"the-grey-candles":{id:"the-grey-candles",title:"The Hall of Grey Candles",text:"The keep's mages bound their lore into candle and flame \u2014 a working-light for every spell, snuffed when the work was done. When the Hollowing took them it did not put their candles out; it froze them mid-burn, grey wax that neither melts nor gutters, a hall of guttering lights that will not die and will not live. Read a hollow mage's open grimoire and the marginalia turns, page by page, from theory to terror to a single word repeated: 'cold, cold, cold.'"},"the-hollowing":{id:"the-hollowing",title:"On the Hollowing",text:"It did not come as armies come. It came as a grey quiet, seeping up from the barrow beneath the capital the night the old king was buried in his crown of cold iron. Where it passed, the living grew thin and forgetful, and the dead grew restless. The scholars named it the Hollowing, for that is what it leaves: a body that walks, emptied of the person who wore it."},"wardens-oath":{id:"wardens-oath",title:"The Wardens' Oath",text:"We swear to walk into the rot when others flee it. We swear to remember the names the Hollowing steals. We swear that the last green thing will not die untended. The Oath is older than Aldermoor and will outlast it. \u2014 inscription, the Warden's shrine"},"the-pale-bishop":{id:"the-pale-bishop",title:"The Pale Bishop",text:"Before the rot, Brother Aldous tended the chapel by the marsh and was loved for his gentleness. The Hollowing did not kill him. It made him its mouth in the south, and now a hundred drowned throats speak his sermons. Pity him, then end him."},"the-rimewood":{id:"the-rimewood",title:"The Rimewood",text:"East of Greyhollow the land climbs into a wood that never thaws. It was green once, they say, before the Hollowing reached it and the cold came down to meet the rot halfway. Now frost-wisps drift between black trunks and the snow remembers every footprint for a hundred years. Few who enter the Rimewood come back, and those who do come back quiet."},"the-frozen-wardens":{id:"the-frozen-wardens",title:"The Frozen Wardens",text:"A cache beneath the ice: cloaks of the Oath, frozen mid-stride, and a journal. 'We came to burn out the rot at its eastern edge,' the last entry reads, 'but the cold here is older than the Hollowing and does not care which of us it takes. If you find this, do not mourn us. Finish the work. \u2014 Capt. Ilse Varn.' Their leader's blade, Winter's Edge, lies beneath them still keen."},"the-blightfen":{id:"the-blightfen",title:"The Blightfen",text:"South and west of Greyhollow the ground gives up being ground and becomes the Blightfen \u2014 a drowned country of black pools and pale fungus, where the Hollowing did not so much kill the land as compost it. The rot here is patient and green-grey and almost gentle, and it grows things: caps and veils and crowns of mushroom that turn, slowly, to follow the warmth of the living. The fen-folk are long gone. What walks the causeways now wears their faces like soft caps of mold."},"the-lost-herbalist":{id:"the-lost-herbalist",title:"The Lost Herbalist",text:"Among the reeds, a flooded stillroom and a swollen journal. 'I came to find a cure in the rot itself,' the last legible page reads, 'for surely what fights the Hollowing must be born of it. I have grown such things. I have eaten of them, to be certain. If I am not back by the new moon, do not come looking \u2014 or if you must, come with fire. \u2014 M.W.' A ring of dried blightcaps still hangs above the bench, and beneath it, Mother Wyste's good silver shears."},"maren-of-greyhollow":{id:"maren-of-greyhollow",title:"Maren of Greyhollow",text:"The crook-backed woman at the peat fire is Maren, who keeps what's left of Greyhollow in salves and stubbornness. She set bones and broke fevers in this waystation for forty years, and means to go on doing it until the rot takes the last of them or the Wardens put it out. She does not weep for the three who fled south before the Oath came \u2014 a reed-cutter and her girl, a sick pilgrim, Wick who made the candles \u2014 but she remembers their names, and asks that someone learn how their story ended. 'The dead deserve a last page,' she says. 'Even out there.'"},"the-reed-mother":{id:"the-reed-mother",title:"The Reed Mother",text:"She made it no further than the first black mile of the Sunken Road. The rot found her with her daughter in her arms and left them so \u2014 grey, still, and holding on. They did not rise; some small mercy in the Hollowing left them only that last shape, a mother and child under the reeds. The Wardens freed the child's reed-doll from her hand and laid them down properly. It was all the road would allow."},"the-last-pilgrim":{id:"the-last-pilgrim",title:"The Last Pilgrim",text:"The pilgrim went south to pray the rot away and found the Drowned Chapel singing to the thing that made it. How he lasted so long among the grey faithful, hidden behind a fallen pew, not even he could say. Whether the Wardens reached him in time to point him home, or only in time to hold his hand as the grey closed over \u2014 that is the part of the story Maren most wished, and most feared, to hear."},"the-candlewright":{id:"the-candlewright",title:"Wick the Candlewright",text:"Wick lit Greyhollow's winters for thirty years; no hearth in the waystation was ever cold while she had wax and wick to spare. The Hollowing took her in the Ashen Keep, and left her there in a side cell, trying with grey and clumsy fingers to coax a flame from a candle long guttered out \u2014 chasing, even hollowed, the one thing she had always been. The Wardens gave her the only light left to give. They set the cold candle back in her hands when it was done."},"primer-of-aldermoor":{id:"primer-of-aldermoor",title:"A Child's Primer of Aldermoor",text:"A water-warped picture-book, taught to every child once. 'Aldermoor is a green kingdom of five holds: Greyhollow on the moor, Drowncross in the marsh, Ashreach under the keep, and Rimehold and Sablefen at the wild edges. Its rivers run to the Cold Sea; its barrows hold its kings. Be kind to the old roads, for they remember your feet.' Someone has crossed out 'green' in a child's heavy hand and written, simply, 'gray now.'"},"greyhollow-ledger":{id:"greyhollow-ledger",title:"The Greyhollow Ledger",text:"The waystation's account book, kept in a careful merchant's hand and then, abruptly, in Maren's. The early pages tally caravans: salt and wool north, ironwork and candles south, a tax of one night's lodging owed to the road. The later pages tally other things \u2014 sacks of seed-corn that came up ash, the date the last caravan failed to arrive, and a list of names with no ledger-column at all, only the word 'south' beside each."},"the-last-almanac":{id:"the-last-almanac",title:"The Last Almanac",text:"A farmer's almanac, its weather-lore failing page by page. 'First frost on the old date,' reads an early entry, then: 'no thaw though the date is past,' th
