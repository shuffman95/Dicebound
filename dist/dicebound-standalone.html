<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0e0b14" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dicebound" />
<title>Dicebound: The Hollow Crown</title>
<style>:root {
  --bg: #0e0b14;
  --bg2: #16111f;
  --panel: #1d1628;
  --panel2: #261d35;
  --ink: #e7dcc8;
  --ink-dim: #a596b0;
  --gold: #e8b659;
  --gold-dim: #9c7a33;
  --blood: #b6402f;
  --hp: #c44; --hp2: #e76;
  --focus: #4aa3d6; --focus2: #6cc6f0;
  --xp: #8a6; --good: #6cba6c; --bad: #d4604f;
  --line: #352a47;
  --radius: 14px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: radial-gradient(120% 100% at 50% 0%, #1a1326 0%, var(--bg) 60%);
  color: var(--ink);
  font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  user-select: none;
}

#app {
  max-width: 920px;
  margin: 0 auto;
  min-height: 100%;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  display: flex;
  flex-direction: column;
}

h1, h2, h3 { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; margin: 0 0 .4em; letter-spacing: .3px; }
.title-serif { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; }

.screen { padding: 18px 16px 28px; flex: 1; display: flex; flex-direction: column; gap: 14px; animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ---------- Title ---------- */
.title-wrap { text-align: center; margin-top: 8vh; }
.title-wrap .crest { font-size: 68px; filter: drop-shadow(0 4px 10px #000a); }
.title-wrap h1 { font-size: 38px; color: var(--gold); text-shadow: 0 2px 0 #000, 0 0 22px #e8b65955; }
.title-wrap .sub { color: var(--ink-dim); font-style: italic; letter-spacing: 2px; text-transform: uppercase; font-size: 12px; }
.title-actions { margin-top: 26px; display: flex; flex-direction: column; gap: 12px; align-items: center; }

/* ---------- Buttons ---------- */
.btn {
  appearance: none; border: 1px solid var(--gold-dim);
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  color: var(--ink); padding: 13px 18px; border-radius: 12px; font-size: 16px; font-weight: 600;
  cursor: pointer; min-width: 220px; text-align: center; transition: transform .06s, box-shadow .15s, border-color .15s;
  box-shadow: 0 2px 0 #0007, inset 0 1px 0 #ffffff0c;
}
.btn:active { transform: translateY(1px); }
.btn.primary { border-color: var(--gold); background: linear-gradient(180deg, #5a4423, #3a2c18); color: var(--gold); }
.btn.full { width: 100%; min-width: 0; }
.btn.small { min-width: 0; padding: 8px 12px; font-size: 14px; border-radius: 10px; }
.btn.ghost { background: #1a1426; border-color: var(--line); }
.btn:disabled { opacity: .42; cursor: not-allowed; }
.btn.danger { border-color: var(--blood); color: #f0a99c; }

.row { display: flex; gap: 10px; flex-wrap: wrap; }
.row.center { justify-content: center; }
.spacer { flex: 1; }
.hidden { display: none !important; }
.dim { color: var(--ink-dim); }
.gold-text { color: var(--gold); font-weight: 700; }
.tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 999px; background: #2a2238; border: 1px solid var(--line); color: var(--ink-dim); }

/* ---------- Panels / cards ---------- */
.panel { background: linear-gradient(180deg, var(--panel), var(--bg2)); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; box-shadow: 0 6px 18px #0006; }
.card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
.banner-art { font-size: 46px; text-align: center; filter: drop-shadow(0 3px 8px #000a); }
.story-text { white-space: pre-wrap; line-height: 1.55; color: var(--ink); }

.topbar { display: flex; align-items: center; gap: 12px; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--line); background: #120d1c; position: sticky; top: 0; z-index: 5; }
.topbar .coins { color: var(--gold); font-weight: 700; }
.topbar .links { display: flex; gap: 8px; }

/* ---------- Class select ---------- */
.class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.class-card { text-align: left; cursor: pointer; border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: var(--panel); transition: border-color .15s, transform .06s; }
.class-card:active { transform: translateY(1px); }
.class-card.sel { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset, 0 0 16px #e8b65933; }
.class-card .cname { color: var(--gold); font-weight: 700; font-size: 17px; }
.class-card .cblurb { color: var(--ink-dim); font-size: 13px; margin-top: 4px; line-height: 1.4; }
.class-card .cstats { font-size: 11px; color: var(--ink-dim); margin-top: 6px; }
.slot-row { display: flex; gap: 8px; flex-wrap: wrap; }
.slot { flex: 1; min-width: 120px; border: 1px dashed var(--line); border-radius: 10px; padding: 8px; text-align: center; font-size: 13px; }
.slot.filled { border-style: solid; border-color: var(--gold-dim); }

/* ---------- Bars ---------- */
.bar { height: 9px; border-radius: 6px; background: #0c0913; overflow: hidden; border: 1px solid #00000055; }
.bar > span { display: block; height: 100%; transition: width .35s ease; }
.bar.hp > span { background: linear-gradient(90deg, var(--hp), var(--hp2)); }
.bar.focus > span { background: linear-gradient(90deg, var(--focus), var(--focus2)); }
.bar.xp > span { background: linear-gradient(90deg, #6a8a4a, var(--xp)); }
.bar.boss { height: 13px; }

/* ---------- Combat ---------- */
.combat { display: flex; flex-direction: column; gap: 10px; }
.enemy-zone, .party-zone { display: grid; gap: 8px; }
.enemy-zone { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
.party-zone { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
.unit { border: 1px solid var(--line); border-radius: 12px; padding: 10px; background: var(--panel); position: relative; transition: box-shadow .15s, border-color .15s, transform .15s; }
.unit.enemy { background: linear-gradient(180deg, #241620, #18101a); }
.unit.active { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset, 0 0 18px #e8b65944; }
.unit.targetable { cursor: pointer; border-color: var(--blood); box-shadow: 0 0 0 1px var(--blood) inset; animation: pulse 1s infinite; }
.unit.heal-target { border-color: var(--good); box-shadow: 0 0 0 1px var(--good) inset; cursor: pointer; }
.unit.dead { opacity: .4; filter: grayscale(1); }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 1px var(--blood) inset, 0 0 6px #b6402f55; } 50% { box-shadow: 0 0 0 1px var(--blood) inset, 0 0 18px #b6402faa; } }
.unit .uname { font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
.unit .uname .lvl { font-size: 11px; color: var(--ink-dim); font-weight: 500; }
.unit . unit-emoji { font-size: 22px; }
.unit .nums { font-size: 12px; color: var(--ink-dim); margin: 3px 0; display: flex; justify-content: space-between; }
.statuses { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; min-height: 16px; }
.chip { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid var(--line); background: #221a30; }
.chip.bad { color: #f0a99c; border-color: #5a2a25; }
.chip.good { color: #a9e0a9; border-color: #2c5a2c; }
.chip.shield { color: #9ccdf0; border-color: #28526a; }
.hitflash { animation: hit .4s; }
@keyframes hit { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); background:#3a1c1c; } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }
.healflash { animation: healf .5s; }
@keyframes healf { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 16px #6cba6caa inset; } }

.turn-banner { text-align: center; font-weight: 700; color: var(--gold); padding: 4px; letter-spacing: .5px; }
.ability-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ability-btn { text-align: left; border: 1px solid var(--line); border-radius: 10px; padding: 9px 10px; background: var(--panel2); cursor: pointer; transition: border-color .12s, transform .06s; }
.ability-btn:active { transform: translateY(1px); }
.ability-btn:disabled { opacity: .4; }
.ability-btn .an { font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; }
.ability-btn .ad { font-size: 11px; color: var(--ink-dim); margin-top: 2px; line-height: 1.3; }
.ability-btn .cost { color: var(--focus2); font-size: 11px; }
.cd-pill { color: var(--ink-dim); font-size: 10px; }

.log { background: #0c0913; border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; height: 132px; overflow-y: auto; font-size: 12.5px; line-height: 1.5; }
.log .e { padding: 1px 0; border-bottom: 1px dotted #ffffff08; }
.log .damage { color: #e9b0a6; }
.log .crit { color: #ffd27a; font-weight: 700; }
.log .heal { color: #a9e0a9; }
.log .miss { color: var(--ink-dim); }
.log .status { color: #c9b6e8; }
.log .death { color: var(--bad); font-weight: 700; }
.log .info { color: var(--ink-dim); }
.log .focus { color: #9ccdf0; }

/* ---------- Dice overlay ---------- */
.dice-layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0009; z-index: 50; gap: 14px; }
.dice-die {
  width: 108px; height: 108px; display: flex; align-items: center; justify-content: center;
  font-size: 46px; font-weight: 800; color: #1a1326;
  background: radial-gradient(circle at 35% 30%, #ffe9b0, var(--gold) 70%);
  clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
  box-shadow: 0 0 40px #e8b65988; text-shadow: 0 1px 0 #fff8;
}
.dice-die.rolling { animation: tumble .6s ease; }
@keyframes tumble { 0% { transform: rotate(-180deg) scale(.4); } 60% { transform: rotate(20deg) scale(1.15); } 100% { transform: rotate(0) scale(1); } }
.dice-die.crit { background: radial-gradient(circle at 35% 30%, #fff, #ffd27a 70%); box-shadow: 0 0 60px #ffd27a; }
.dice-die.fumble { background: radial-gradient(circle at 35% 30%, #d98, var(--blood) 70%); color: #1a0d0a; box-shadow: 0 0 40px #b6402f; }
.dice-caption { color: var(--ink); font-size: 15px; font-weight: 600; text-align: center; background: #0008; padding: 6px 14px; border-radius: 10px; }

/* ---------- Shop / lists ---------- */
.list { display: flex; flex-direction: column; gap: 8px; }
.li { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
.li .grow { flex: 1; }
.li .iname { font-weight: 600; }
.li .idesc { font-size: 12px; color: var(--ink-dim); }
.li .price { color: var(--gold); font-weight: 700; font-size: 14px; }
.gear-li { align-items: flex-start; }
.set-tag { color: var(--gold); border-color: var(--gold-dim); }

/* ---------- Modal ---------- */
.modal-back { position: fixed; inset: 0; background: #000b; z-index: 40; display: flex; align-items: flex-end; justify-content: center; animation: fade .2s; }
.modal { background: var(--bg2); border: 1px solid var(--line); border-top-left-radius: 18px; border-top-right-radius: 18px; width: 100%; max-width: 920px; max-height: 86vh; overflow-y: auto; padding: 16px; box-shadow: 0 -10px 40px #000a; }
.modal h2 { color: var(--gold); }
.modal-head { display: flex; justify-content: space-between; align-items: center; position: sticky; top: -16px; background: var(--bg2); padding: 6px 0 10px; margin: -6px 0 6px; }

.toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); background: #2a2238; border: 1px solid var(--gold-dim); color: var(--ink); padding: 10px 16px; border-radius: 12px; z-index: 60; box-shadow: 0 6px 20px #000a; animation: fade .2s; max-width: 90%; text-align: center; pointer-events: none; transition: bottom .15s ease; }

/* ---------- Character creation ---------- */
.creation { gap: 10px; }
.crt-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.crt-tab { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 8px 4px; cursor: pointer; text-align: center; transition: border-color .12s; }
.crt-tab.sel { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
.crt-emoji { font-size: 22px; }
.crt-tname { font-size: 11px; color: var(--ink-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.creation-card { display: flex; flex-direction: column; gap: 10px; }
.picker { border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; background: #170f23; }
.picker-head { display: flex; justify-content: space-between; align-items: center; }
.picker-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
.picker-ctrls { display: flex; gap: 6px; }
.picker-arrow { min-width: 36px; font-size: 18px; padding: 2px 8px; }
.picker-name { font-weight: 700; font-size: 16px; }
.picker-desc { font-size: 12px; line-height: 1.35; margin-top: 2px; }
.alloc-wrap { border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; background: #170f23; }
.alloc-points { font-size: 12px; color: var(--ink-dim); }
.alloc-points.has { color: var(--gold); font-weight: 700; }
.alloc-row { display: grid; grid-template-columns: 1fr 40px 90px 40px; align-items: center; gap: 6px; margin-top: 6px; }
.alloc-name { font-size: 14px; }
.alloc-btn { min-width: 40px; font-size: 18px; padding: 2px; }
.alloc-val { text-align: center; font-weight: 600; }
.derived { display: flex; justify-content: space-around; gap: 8px; font-size: 14px; font-weight: 600; background: #0c0913; border-radius: 10px; padding: 8px; border: 1px solid var(--line); }
.trait-list { display: flex; flex-direction: column; gap: 5px; }
.trait-chip { font-size: 11.5px; color: var(--ink-dim); background: #221a30; border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px; line-height: 1.3; }
.trait-chip b { color: var(--gold); }

/* ---------- Talents ---------- */
.talent-wrap { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
.talent-tier { border: 1px solid var(--line); border-radius: 12px; padding: 10px; background: #170f23; }
.tier-head { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--gold); margin-bottom: 8px; }
.talent-node { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 7px; background: var(--panel); }
.talent-node:last-child { margin-bottom: 0; }
.talent-node .tname { font-weight: 700; font-size: 14px; }
.talent-node .tdesc { font-size: 12px; color: var(--ink-dim); line-height: 1.35; }
.talent-node.owned { border-color: var(--good); box-shadow: 0 0 0 1px #2c5a2c inset; }
.talent-node.learnable { border-color: var(--gold); }
.talent-node.locked { opacity: .5; }
.talent-node.unavail { opacity: .8; }

/* ---------- Settings ---------- */
.set-list { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
.set-row { display: flex; align-items: center; gap: 10px; }
.set-row > span:first-child { flex: 0 0 70px; font-size: 14px; }
.vol-slider { flex: 1; accent-color: var(--gold); height: 26px; }
.vol-num { flex: 0 0 30px; text-align: right; color: var(--ink-dim); font-size: 13px; }

.kv { display: grid; grid-template-columns: auto 1fr; gap: 2px 10px; font-size: 13px; }
.kv .k { color: var(--ink-dim); }
.center-col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.big-emoji { font-size: 56px; }
.lvlup { color: var(--gold); font-weight: 700; }

/* =====================================================================
   Accessibility / display preferences
   Toggled from Settings; applied as <body> classes by main.ts. The
   prefers-reduced-motion block also honours the OS setting automatically.
   ===================================================================== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .001ms !important;
  }
}
body.reduce-motion *, body.reduce-motion *::before, body.reduce-motion *::after {
  animation-duration: .001ms !important;
  animation-iteration-count: 1 !important;
  transition-duration: .001ms !important;
  scroll-behavior: auto !important;
}

/* Larger text — scale the main reading surfaces (narrative, choices, lists). */
body.text-large { font-size: 18px; }
body.text-large .story-text { font-size: 1.07em; line-height: 1.7; }
body.text-large .btn { font-size: 17px; }
body.text-large .btn.small { font-size: 15px; }
body.text-large .idesc, body.text-large .ability-btn .ad { font-size: 13px; line-height: 1.4; }
body.text-large .ability-btn .an { font-size: 15px; }

/* High contrast — brighten ink, deepen ground, strengthen lines (all themed
   through CSS variables, so this re-skins the whole UI cleanly). */
body.high-contrast {
  --ink: #ffffff;
  --ink-dim: #ded5e8;
  --gold: #ffd479;
  --gold-dim: #b48a3a;
  --bg: #000000;
  --bg2: #0b0810;
  --panel: #15101e;
  --panel2: #1f1731;
  --line: #6b5b82;
}
body.high-contrast .story-text { color: #ffffff; }

/* Large touch targets — taller controls for easier tapping. */
body.big-touch .btn { min-height: 54px; }
body.big-touch .btn.small { min-height: 44px; padding: 11px 14px; }
body.big-touch .ability-btn { min-height: 50px; }
body.big-touch .set-row .btn.small { min-height: 40px; }

/* =====================================================================
   Splash / launch screen — a brief branded overlay shown once on load,
   fading into the title. Tap to skip; auto-dismisses; respects reduce-motion.
   ===================================================================== */
.splash {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  background: radial-gradient(120% 100% at 50% 0%, #1a1326 0%, var(--bg) 60%);
  transition: opacity .5s ease;
}
.splash.hide { opacity: 0; pointer-events: none; }
.splash .crest { font-size: 88px; filter: drop-shadow(0 6px 16px #000a); animation: splashRise .9s ease both; }
.splash .stitle {
  font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
  font-size: 34px; color: var(--gold); text-shadow: 0 2px 0 #000, 0 0 24px #e8b65955;
  animation: splashRise .9s ease .12s both;
}
.splash .stag {
  color: var(--ink-dim); font-style: italic; letter-spacing: 3px; text-transform: uppercase;
  font-size: 12px; animation: splashRise .9s ease .24s both;
}
@keyframes splashRise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="app"></div>
<div id="splash" class="splash" aria-hidden="true">
  <div class="crest">👑</div>
  <div class="stitle">Dicebound</div>
  <div class="stag">The Hollow Crown</div>
</div>
<div id="dice-layer" class="dice-layer hidden" aria-hidden="true">
  <div class="dice-die" id="dice-die">20</div>

<b>Attributes.</b>
\u2022 <b>Might</b> \u2014 melee attack & damage, brawn checks.
\u2022 <b>Agility</b> \u2014 defense, finesse strikes, stealth & lockpicking.
\u2022 <b>Wits</b> \u2014 arcane attack & damage, lore & perception.
\u2022 <b>Spirit</b> \u2014 healing power, Focus pool, resolve.

<b>Combat.</b> Initiative is rolled at the start. On a hero's turn, spend <b>Focus</b> on abilities or use a basic attack for free. Drop every enemy to win; if the whole party falls, it's over (Revive, Phoenix Tears, or the Warden can save a fallen ally).

<b>Story.</b> Choices marked with a stat and DC are dice checks \u2014 your best-suited hero rolls. Win fights for XP, gold and loot; spend gold at the apothecary and rest to heal.

<b>\u0425\u0430\u0440\u0430\u043A\u0442\u0435\u0440\u0438\u0441\u0442\u0438\u043A\u0438.</b>
\u2022 <b>\u0421\u0438\u043B\u0430</b> \u2014 \u0431\u043B\u0438\u0436\u043D\u0438\u0439 \u0431\u043E\u0439: \u0430\u0442\u0430\u043A\u0430 \u0438 \u0443\u0440\u043E\u043D, \u043F\u0440\u043E\u0432\u0435\u0440\u043A\u0438 \u043D\u0430 \u0433\u0440\u0443\u0431\u0443\u044E \u0441\u0438\u043B\u0443.
\u2022 <b>\u041B\u043E\u0432\u043A\u043E\u0441\u0442\u044C</b> \u2014 \u0437\u0430\u0449\u0438\u0442\u0430, \u0442\u043E\u0447\u043D\u044B\u0435 \u0443\u0434\u0430\u0440\u044B, \u0441\u043A\u0440\u044B\u0442\u043D\u043E\u0441\u0442\u044C \u0438 \u0432\u0437\u043B\u043E\u043C \u0437\u0430\u043C\u043A\u043E\u0432.
\u2022 <b>\u0420\u0430\u0437\u0443\u043C</b> \u2014 \u043C\u0430\u0433\u0438\u0447\u0435\u0441\u043A\u0438\u0435 \u0430\u0442\u0430\u043A\u0430 \u0438 \u0443\u0440\u043E\u043D, \u0437\u043D\u0430\u043D\u0438\u044F \u0438 \u0432\u043D\u0438\u043C\u0430\u0442\u0435\u043B\u044C\u043D\u043E\u0441\u0442\u044C.
\u2022 <b>\u0414\u0443\u0445</b> \u2014 \u0441\u0438\u043B\u0430 \u0438\u0441\u0446\u0435\u043B\u0435\u043D\u0438\u044F, \u0437\u0430\u043F\u0430\u0441 \u0424\u043E\u043A\u0443\u0441\u0430, \u0441\u0442\u043E\u0439\u043A\u043E\u0441\u0442\u044C.

<b>\u0411\u043E\u0439.</b> \u0412 \u043D\u0430\u0447\u0430\u043B\u0435 \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u044F\u0435\u0442\u0441\u044F \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430. \u0412 \u0441\u0432\u043E\u0439 \u0445\u043E\u0434 \u0433\u0435\u0440\u043E\u0439 \u0442\u0440\u0430\u0442\u0438\u0442 <b>\u0424\u043E\u043A\u0443\u0441</b> \u043D\u0430 \u0441\u043F\u043E\u0441\u043E\u0431\u043D\u043E\u0441\u0442\u0438 \u0438\u043B\u0438 \u0431\u0435\u0441\u043F\u043B\u0430\u0442\u043D\u043E \u043D\u0430\u043D\u043E\u0441\u0438\u0442 \u043E\u0431\u044B\u0447\u043D\u0443\u044E \u0430\u0442\u0430\u043A\u0443. \u041F\u043E\u0431\u0435\u0434\u0430 \u2014 \u043A\u043E\u0433\u0434\u0430 \u043F\u043E\u0432\u0435\u0440\u0436\u0435\u043D\u044B \u0432\u0441\u0435 \u0432\u0440\u0430\u0433\u0438; \u0435\u0441\u043B\u0438 \u043F\u0430\u0434\u0451\u0442 \u0432\u0435\u0441\u044C \u043E\u0442\u0440\u044F\u0434, \u0438\u0433\u0440\u0430 \u043E\u043A\u043E\u043D\u0447\u0435\u043D\u0430 (\u0412\u043E\u0441\u043A\u0440\u0435\u0448\u0435\u043D\u0438\u0435, \u0421\u043B\u0451\u0437\u044B \u0444\u0435\u043D\u0438\u043A\u0441\u0430 \u0438\u043B\u0438 \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u044C \u0441\u043F\u043E\u0441\u043E\u0431\u043D\u044B \u043F\u043E\u0434\u043D\u044F\u0442\u044C \u043F\u0430\u0432\u0448\u0435\u0433\u043E \u0441\u043E\u044E\u0437\u043D\u0438\u043A\u0430).

<b>\u0421\u044E\u0436\u0435\u0442.</b> \u0412\u044B\u0431\u043E\u0440\u044B, \u043F\u043E\u043C\u0435\u0447\u0435\u043D\u043D\u044B\u0435 \u0445\u0430\u0440\u0430\u043A\u0442\u0435\u0440\u0438\u0441\u0442\u0438\u043A\u043E\u0439 \u0438 \u0421\u041B, \u2014 \u044D\u0442\u043E \u043F\u0440\u043E\u0432\u0435\u0440\u043A\u0438 \u043A\u0443\u0431\u0438\u043A\u043E\u043C: \u0431\u0440\u043E\u0441\u0430\u0435\u0442 \u043D\u0430\u0438\u0431\u043E\u043B\u0435\u0435 \u043F\u043E\u0434\u0445\u043E\u0434\u044F\u0449\u0438\u0439 \u0433\u0435\u0440\u043E\u0439. \u041F\u043E\u0431\u0435\u0436\u0434\u0430\u0439\u0442\u0435 \u0432 \u0431\u043E\u044F\u0445 \u0440\u0430\u0434\u0438 \u043E\u043F\u044B\u0442\u0430, \u0437\u043E\u043B\u043E\u0442\u0430 \u0438 \u0434\u043E\u0431\u044B\u0447\u0438; \u0442\u0440\u0430\u0442\u044C\u0442\u0435 \u0437\u043E\u043B\u043E\u0442\u043E \u0443 \u0430\u043F\u0442\u0435\u043A\u0430\u0440\u044F \u0438 \u043E\u0442\u0434\u044B\u0445\u0430\u0439\u0442\u0435, \u0447\u0442\u043E\u0431\u044B \u0438\u0441\u0446\u0435\u043B\u0438\u0442\u044C\u0441\u044F.

43D\u0438\u043B\u0430 \u043A\u0440\u043E\u0442\u043A\u043E\u0435 \u0443\u0447\u0435\u043D\u0438\u0435: \u0447\u0442\u043E \u043C\u0451\u0440\u0442\u0432\u044B\u043C \u043F\u0440\u0438\u0447\u0438\u0442\u0430\u0435\u0442\u0441\u044F \u043F\u0430\u043C\u044F\u0442\u044C, \u0430 \u0436\u0438\u0432\u044B\u0435 \u0434\u043E\u043B\u0436\u043D\u044B \u0434\u0440\u0443\u0433 \u0434\u0440\u0443\u0433\u0443 \u0445\u043B\u0435\u0431. \u0420\u0430\u0437\u043C\u043E\u043A\u0448\u0438\u0439 \u0441\u0431\u043E\u0440\u043D\u0438\u043A \u0433\u0438\u043C\u043D\u043E\u0432 \u0432\u0441\u0451 \u0435\u0449\u0451 \u0445\u0440\u0430\u043D\u0438\u0442 \u0441\u0442\u0430\u0440\u044B\u0435 \u0441\u0442\u0438\u0445\u0438 \u2014 \u0438, \u0432\u0442\u0438\u0441\u043D\u0443\u0442\u0443\u044E \u043C\u0435\u0436 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u0438\u0445 \u0441\u0442\u0440\u0430\u043D\u0438\u0446 \u0441\u0432\u0435\u0436\u0438\u043C\u0438 \u0441\u0435\u0440\u044B\u043C\u0438 \u0447\u0435\u0440\u043D\u0438\u043B\u0430\u043C\u0438, \u043D\u043E\u0432\u0443\u044E \u0441\u0442\u0440\u043E\u043A\u0443 \u043D\u0430 \u044F\u0437\u044B\u043A\u0435, \u043A\u043E\u0442\u043E\u0440\u043E\u0433\u043E \u0436\u0438\u0432\u044B\u043C \u0437\u043D\u0430\u0442\u044C \u043D\u0435 \u0441\u043B\u0435\u0434\u0443\u0435\u0442, \u0447\u0442\u043E \u0442\u0435\u043F\u0435\u0440\u044C \u043F\u043E\u044E\u0442 \u0441\u043E\u0442\u043D\u0435\u0439 \u0443\u0442\u043E\u043F\u0448\u0438\u0445 \u0433\u043B\u043E\u0442\u043E\u043A. \u041A\u043E\u0440\u043E\u043D\u0430 \u043D\u0435 \u0437\u0430\u0441\u0442\u0430\u0432\u0438\u043B\u0430 \u0432\u0435\u0440\u0443 \u0443\u043C\u043E\u043B\u043A\u043D\u0443\u0442\u044C. \u041E\u043D\u0430 \u0432\u044B\u0443\u0447\u0438\u043B\u0430 \u043D\u0430\u043F\u0435\u0432 \u0438 \u0441\u043C\u0435\u043D\u0438\u043B\u0430 \u0441\u043B\u043E\u0432\u0430."},"the-reliquary-saint":{title:"\u0417\u0430\u0447\u0430\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0439 \u0440\u0435\u043B\u0438\u043A\u0432\u0430\u0440\u0438\u0439",text:"\u0420\u0435\u043B\u0438\u043A\u0432\u0430\u0440\u0438\u0439 \u0432 \u043B\u0430\u0442\u0443\u043D\u043D\u044B\u0445 \u043A\u043E\u043B\u044C\u0446\u0430\u0445 \u0431\u044B\u043B \u0437\u0430\u0447\u0430\u0440\u043E\u0432\u0430\u043D \u043D\u0435 \u0434\u043B\u044F \u0442\u043E\u0433\u043E, \u0447\u0442\u043E\u0431\u044B \u043D\u0435 \u0432\u043F\u0443\u0441\u0442\u0438\u0442\u044C \u0432\u043E\u0440\u043E\u0432, \u0430 \u0447\u0442\u043E\u0431\u044B \u0443\u0434\u0435\u0440\u0436\u0430\u0442\u044C \u043D\u0435\u0447\u0442\u043E \u0432\u043D\u0443\u0442\u0440\u0438: \u0444\u0430\u043B\u0430\u043D\u0433\u0443 \u0441\u0432\u044F\u0442\u043E\u0439 \u0418\u043B\u043B\u044B \u0443 \u0411\u0440\u043E\u0434\u0430, \u0447\u0442\u043E, \u043F\u043E \u043F\u0440\u0435\u0434\u0430\u043D\u0438\u044E, \u0432\u043E\u0448\u043B\u0430 \u0432 \u0440\u0430\u0437\u043B\u0438\u0432\u0448\u0443\u044E\u0441\u044F \u0440\u0435\u043A\u0443, \u0447\u0442\u043E\u0431\u044B \u043F\u0435\u0440\u0435\u043D\u0435\u0441\u0442\u0438 \u0434\u0438\u0442\u044F \u043D\u0430 \u0434\u0440\u0443\u0433\u043E\u0439 \u0431\u0435\u0440\u0435\u0433, \u0438 \u043E\u0431\u0440\u0430\u0442\u043D\u043E \u043D\u0435 \u0432\u044B\u0448\u043B\u0430. \u041E\u0431\u0435\u0440\u0435\u0433\u0438 \u2014 \u0441\u0442\u0430\u0440\u0430\u044F \u0432\u043E\u0434\u043D\u0430\u044F \u043C\u0430\u0433\u0438\u044F, \u043F\u0440\u0438\u0437\u0432\u0430\u043D\u043D\u0430\u044F \u0441\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0442\u044C \u0443\u0442\u043E\u043F\u043B\u0435\u043D\u0438\u0435. \u041E\u043D\u0438 \u0434\u0435\u0440\u0436\u0430\u043B\u0438\u0441\u044C, \u043D\u0430 \u0441\u0432\u043E\u0439 \u043B\u0430\u0434, \u0432\u0441\u0451 \u044D\u0442\u043E \u0432\u0440\u0435\u043C\u044F \u2014 \u043E\u0442\u0442\u043E\u0433\u043E, \u0431\u044B\u0442\u044C \u043C\u043E\u0436\u0435\u0442, \u0443\u0442\u043E\u043D\u0443\u043B\u0430 \u0447\u0430\u0441\u043E\u0432\u043D\u044F, \u0430 \u043D\u0435 \u0440\u0435\u043B\u0438\u043A\u0432\u0438\u044F."},"the-iron-garrison":{title:"\u0416\u0435\u043B\u0435\u0437\u043D\u044B\u0439 \u0433\u0430\u0440\u043D\u0438\u0437\u043E\u043D",text:"\u0420\u044B\u0446\u0430\u0440\u0438-\u043F\u0440\u0438\u0437\u0440\u0430\u043A\u0438 \u0443 \u0432\u043E\u0440\u043E\u0442 \u0431\u044B\u043B\u0438 \u043D\u0435\u043A\u043E\u0433\u0434\u0430 \u0436\u0438\u0432\u044B\u043C \u0433\u0430\u0440\u043D\u0438\u0437\u043E\u043D\u043E\u043C \u041F\u0435\u043F\u0435\u043B\u044C\u043D\u043E\u0439 \u0426\u0438\u0442\u0430\u0434\u0435\u043B\u0438 \u2014 \u0442\u0440\u0438 \u0441\u043E\u0442\u043D\u0438 \u043A\u043B\u0438\u043D\u043A\u043E\u0432, \u043F\u043E\u043A\u043B\u044F\u0432\u0448\u0438\u0445\u0441\u044F \u0443\u0434\u0435\u0440\u0436\u0430\u0442\u044C \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u044E\u044E \u0442\u0432\u0435\u0440\u0434\u044B\u043D\u044E \u043A\u043E\u0440\u043E\u043B\u0435\u0432\u0441\u0442\u0432\u0430 \u043F\u0440\u043E\u0442\u0438\u0432 \u043B\u044E\u0431\u043E\u0439 \u0430\u0440\u043C\u0438\u0438. \u0410\u0440\u043C\u0438\u044F \u043D\u0435 \u043F\u0440\u0438\u0448\u043B\u0430. \u0412\u043C\u0435\u0441\u0442\u043E \u043D\u0435\u0451 \u043F\u0440\u0438\u0448\u043B\u043E \u041E\u043F\u0443\u0441\u0442\u043E\u0448\u0435\u043D\u0438\u0435 \u2014 \u0447\u0435\u0440\u0435\u0437 \u043A\u043E\u043B\u043E\u0434\u0435\u0437\u043D\u0443\u044E \u0432\u043E\u0434\u0443 \u0438 \u0445\u043B\u0435\u0431 \u2014 \u0438 \u0437\u0430\u0431\u0440\u0430\u043B\u043E \u0438\u0445 \u043D\u0430 \u043F\u043E\u0441\u0442\u0430\u0445 \u0442\u0430\u043A \u0442\u0438\u0445\u043E, \u0447\u0442\u043E \u0441\u0435\u0440\u044B\u0435 \u0437\u043D\u0430\u043C\u0451\u043D\u0430 \u0434\u0430\u0436\u0435 \u043D\u0435 \u043F\u0430\u043B\u0438. \u041E\u043D\u0438 \u0434\u0435\u0440\u0436\u0430\u0442 \u0432\u043E\u0440\u043E\u0442\u0430 \u0438 \u043F\u043E\u043D\u044B\u043D\u0435. \u041E\u043D\u0438 \u0432\u0441\u0435\u0433\u0434\u0430 \u0441\u043E\u0431\ u044F"},"the-pale-bishop":{title:"\u0411\u043B\u0435\u0434\u043D\u044B\u0439 \u0415\u043F\u0438\u0441\u043A\u043E\u043F",text:"\u0414\u043E \u0433\u043D\u0438\u043B\u0438 \u0431\u0440\u0430\u0442 \u0410\u043B\u0434\u0443\u0441 \u0431\u0435\u0440\u0451\u0433 \u0447\u0430\u0441\u043E\u0432\u043D\u044E \u0443 \u0431\u043E\u043B\u043E\u0442\u0430 \u0438 \u0431\u044B\u043B \u043B\u044E\u0431\u0438\u043C \u0437\u0430 \u0441\u0432\u043E\u044E \u043A\u0440\u043E\u0442\u043E\u0441\u0442\u044C. \u041E\u043F\u0443\u0441\u0442\u043E\u0448\u0435\u043D\u0438\u0435 \u043D\u0435 \u0443\u0431\u0438\u043B\u043E \u0435\u0433\u043E. \u041E\u043D\u043E \u0441\u0434\u0435\u043B\u0430\u043B\u043E \u0435\u0433\u043E \u0441\u0432\u043E\u0438\u043C\u0438 \u0443\u0441\u0442\u0430\u043C\u0438 \u043D\u0430 \u044E\u0433\u0435, \u0438 \u0442\u0435\u043F\u0435\u0440\u044C \u0441\u043E\u0442\u043D\u044F \u0443\u0442\u043E\u043F\u0448\u0438\u0445 \u0433\u043B\u043E\u0442\u043E\u043A \u043F\u0440\u043E\u0438\u0437\u043D\u043E\u0441\u0438\u0442 \u0435\u0433\u043E \u043F\u0440\u043E\u043F\u043E\u0432\u0435\u0434\u0438. \u041F\u043E\u0436\u0430\u043B\u0435\u0439\u0442\u0435 \u0435\u0433\u043E \u2014 \u0430 \u0437\u0430\u0442\u0435\u043C \u043F\u043E\u043A\u043E\u043D\u0447\u0438\u0442\u0435 \u0441 \u043D\u0438\u043C."},"the-rimewood":{title:"\u041C\u043E\u0440\u043E\u0437\u043D\u044B\u0439 \u043B\u0435\u0441",text:"\u041A \u0432\u043E\u0441\u0442\u043E\u043A\u0443 \u043E\u0442 \u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443 \u0437\u0435\u043C\u043B\u044F \u043F\u043E\u0434\u043D\u0438\u043C\u0430\u0435\u0442\u0441\u044F \u0432 \u043B\u0435\u0441, \u0447\u0442\u043E \u043D\u0438\u043A\u043E\u0433\u0434\u0430 \u043D\u0435 \u043E\u0442\u0442\u0430\u0438\u0432\u0430\u0435\u0442. \u0413\u043E\u0432\u043E\u0440\u044F\u0442, \u043D\u0435\u043A\u043E\u0433\u0434\u0430 \u043E\u043D \u0431\u044B\u043B \u0437\u0435\u043B\u0451\u043D\u044B\u043C, \u043F\u0440\u0435\u0436\u0434\u0435 \u0447\u0435\u043C \u0434\u043E \u043D\u0435\u0433\u043E \u0434\u043E\u0442\u044F\u043D\u0443\u043B\u043E\u0441\u044C \u041E\u043F\u0443\u0441\u0442\u043E\u0448\u0435\u043D\u0438\u0435 \u0438 \u0445\u043E\u043B\u043E\u0434 \u0441\u043F\u0443\u0441\u0442\u0438\u043B\u0441\u044F \u0435\u043C\u0443 \u043D\u0430\u0432\u0441\u0442\u0440\u0435\u0447\u0443, \u043D\u0430 \u043F\u043E\u043B\u043F\u0443\u0442\u0438 \u043A \u0433\u043D\u0438\u043B\u0438. \u0422\u0435\u043F\u0435\u0440\u044C \u043C\u043E\u0440\u043E\u0437\u043D\u044B\u0435 \u043E\u0433\u043E\u043D\u044C\u043A\u0438 \u0434\u0440\u0435\u0439\u0444\u0443\u044E\u0442 \u043C\u0435\u0436 \u0447\u0451\u0440\u043D\u044B\u0445 \u0441\u0442\u0432\u043E\u043B\u043E\u0432, \u0430 \u0441\u043D\u0435\u0433 \u0441\u0442\u043E \u043B\u0435\u0442 \u043F\u043E\u043C\u043D\u0438\u0442 \u043A\u0430\u0436\u0434\u044B\u0439 \u0441\u043B\u0435\u0434. \u041D\u0435\u043C\u043D\u043E\u0433\u0438\u0435, \u043A\u0442\u043E \u0432\u0445\u043E\u0434\u0438\u0442 \u0432 \u041C\u043E\u0440\u043E\u0437\u043D\u044B\u0439 \u043B\u0435\u0441, \u0432\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u044E\u0442\u0441\u044F, \u0430 \u0442\u0435, \u043A\u0442\u043E \u0432\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044F, \u0432\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u044E\u0442\u0441\u044F \u043C\u043E\u043B\u0447\u0430\u043B\u0438\u0432\u044B\u043C\u0438."},"the-frozen-wardens":{title:"\u0417\u0430\u043C\u0451\u0440\u0437\u0448\u0438\u0435 \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u0438",text:"\u0422\u0430\u0439\u043D\u0438\u043A \u043F\u043E\u0434\u043E \u043B\u044C\u0434\u043E\u043C: \u043F\u043B\u0430\u0449\u0438 \u041A\u043B\u044F\u0442\u0432\u044B, \u0437\u0430\u043C\u0451\u0440\u0437\u0448\u0438\u0435 \u043D\u0430 \u043F\u043E\u043B\u0443\u0448\u0430\u0433\u0435, \u0438 \u0436\u0443\u0440\u043D\u0430\u043B. \xAB\u041C\u044B \u043F\u0440\u0438\u0448\u043B\u0438 \u0432\u044B\u0436\u0435\u0447\u044C \u0433\u043D\u0438\u043B\u044C \u0443 \u0435\u0451 \u0432\u043E\u0441\u0442\u043E\u0447\u043D\u043E\u0433\u043E \u043A\u0440\u0430\u044F, \u2014 \u0433\u043B\u0430\u0441\u0438\u0442 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u044F\u044F \u0437\u0430\u043F\u0438\u0441\u044C, \u2014 \u043D\u043E \u0445\u043E\u043B\u043E\u0434 \u0437\u0434\u0435\u0441\u044C \u0441\u0442\u0430\u0440\u0448\u0435 \u041E\u043F\u0443\u0441\u0442\u043E\u0448\u0435\u043D\u0438\u044F, \u0438 \u0435\u043C\u0443 \u0432\u0441\u0451 \u0440\u0430\u0432\u043D\u043E, \u043A\u043E\u0433\u043E \u0438\u0437 \u043D\u0430\u0441 \u043E\u043D \u0437\u0430\u0431\u0435\u0440\u0451\u0442. \u0415\u0441\u043B\u0438 \u043D\u0430\u0439\u0434\u0451\u0448\u044C \u044D\u0442\u043E \u2014 \u043D\u0435 \u043E\u043F\u043B\u0430\u043A\u0438\u0432\u0430\u0439 \u043D\u0430\u0441. \u0414\u043E\u0432\u0435\u0440\u0448\u0438 \u0434\u0435\u043B\u043E. \u2014 \u043A\u0430\u043F. \u0418\u043B\u044C\u0437\u0430 \u0412\u0430\u0440\u043D\xBB. \u041A\u043B\u0438\u043D\u043E\u043A \u0438\u0445 \u043F\u0440\u0435\u0434\u0432\u043E\u0434\u0438\u0442\u0435\u043B\u044C\u043D\u0438\u0446\u044B, \u0413\u0440\u0430\u043D\u044C \u0417\u0438\u043C\u044B, \u043B\u0435\u0436\u0438\u0442 \u043F\u043E\u0434 \u043D\u0438\u043C\u0438, \u0432\u0441\u0451 \u0435\u0449\u0451 \u043E\u0441\u0442\u0440\u044B\u0439."},"the-blightfen":{title:"\u0413\u043D\u0438\u043B\u043E\u0442\u043E\u043F\u044C",text:"\u041A \u044E\u0433\u0443 \u0438 \u0437\u0430\u043F\u0430\u0434\u0443 \u043E\u0442 \u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443 \u0437\u0435\u043C\u043B\u044F \u043F\u0435\u0440\u0435\u0441\u0442\u0430\u0451\u0442 \u0431\u044B\u0442\u044C \u0437\u0435\u043C\u043B\u0451\u0439 \u0438 \u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u0441\u044F \u0413\u043D\u0438\u043B\u043E\u0442\u043E\u043F\u044C\u044E \u2014 \u0443\u0442\u043E\u043D\u0443\u0432\u0448\u0438\u043C \u043A\u0440\u0430\u0435\u043C \u0447\u0451\u0440\u043D\u044B\u0445 \u043E\u043C\u0443\u0442\u043E\u0432 \u0438 \u0431\u043B\u0435\u0434\u043D\u044B\u0445 \u0433\u0440\u0438\u0431\u043E\u0432, \u0433\u0434\u0435 \u041E\u043F\u0443\u0441\u0442\u043E\u0448\u0435\u043D\u0438\u0435 \u043D\u0435 \u0441\u0442\u043E\u043B\u044C\u043A\u043E \u0443\u0431\u0438\u043B\u043E \u0437\u0435\u043C\u043B\u044E, \u0441\u043A\u043E\u043B\u044C\u043A\u043E \u043F\u0435\u0440\u0435\u0433\u043D\u043E\u0438\u043B\u043E \u0435\u0451. \u0413\u043D\u0438\u043B\u044C \u0437\u0434\u0435\u0441\u044C \u0442\u0435\u0440\u043F\u0435\u043B\u0438\u0432\u0430\u044F, \u0437\u0435\u043B\u0435\u043D\u043E\u0432\u0430\u0442\u043E-\u0441\u0435\u0440\u0430\u044F \u0438 \u043F\u043E\u0447\u0442\u0438 \u043B\u0430\u0441\u043A\u043E\u0432\u0430\u044F, \u0438 \u043E\u043D\u0430 \u0440\u0430\u0441\u0442\u0438\u0442: \u0448\u043B\u044F\u043F\u043A\u0438, \u043F\u043E\u043A\u0440\u043E\u0432\u044B \u0438 \u043A\u043E\u0440\u043E\u043D\u044B \u0433\u0440\u0438\u0431\u043E\u0432, \u0447\u0442\u043E \u043C\u0435\u0434\u043B\u0435\u043D\u043D\u043E \u043F\u043E\u0432\u043E\u0440\u0430\u0447\u0438\u0432\u0430\u044E\u0442\u0441\u044F \u0432\u0441\u043B\u0435\u0434 \u0442\u0435\u043F\u043B\u0443 \u0436\u0438\u0432\u043E\u0433\u043E. \u0422\u043E\u043F\u044F\u043D\u043E\u0439 \u043D\u0430\u0440\u043E\u0434 \u0434\u0430\u0432\u043D\u043E \u0441\u0433\u0438\u043D\u0443\u043B. \u0422\u043E, \u0447\u0442\u043E \u0431\u0440\u043E\u0434\u0438\u0442 \u043D\u044B\u043D\u0435 \u043F\u043E \u0433\u0430\u0442\u044F\u043C, \u043D\u043E\u0441\u0438\u0442 \u0438\u0445 \u043B\u0438\u0446\u0430, \u043A\u0430\u043A \u043C\u044F\u0433\u043A\u0438\u0435 \u0448\u043B\u044F\u043F\u043A\u0438 \u043F\u043B\u0435\u0441\u0435\u043D\u0438."},"the-lost-herbalist":{title:"\u041F\u043E\u0442\u0435\u0440\u044F\u043D\u043D\u0430\u044F \u0442\u0440\u0430\u0432\u043D\u0438\u0446\u0430",text:"\u0421\u0440\u0435\u0434\u0438 \u0442\u0440\u043E\u0441\u0442\u043D\u0438\u043A\u0430 \u2014 \u0437\u0430\u0442\u043E\u043F\u043B\u0435\u043D\u043D\u0430\u044F \u043F\u0435\u0440\u0435\u0433\u043E\u043D\u043D\u0430\u044F \u0438 \u0440\u0430\u0437\u0431\u0443\u0445\u0448\u0438\u0439 \u0436\u0443\u0440\u043D\u0430\u043B. \xAB\u042F \u043F\u0440\u0438\u0448\u043B\u0430 \u043D\u0430\u0439\u0442\u0438 \u043B\u0435\u043A\u0430\u0440\u0441\u0442\u0432\u043E \u0432 \u0441\u0430\u043C\u043E\u0439 \u0433\u043D\u0438\u043B\u0438, \u2014 \u0433\u043B\u0430\u0441\u0438\u0442 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u044F\u044F \u0440\u0430\u0437\u043B\u0438\u0447\u0438\u043C\u0430\u044F \u0441\u0442\u0440\u0430\u043D\u0438\u0446\u0430, \u2014 \u0438\u0431\u043E \u0442\u043E, \u0447\u0442\u043E \u0431\u043E\u0440\u0435\u0442\u0441\u044F \u0441 \u041E\u043F\u0443\u0441\u0442\u043E\u0448\u0435\u043D\u0438\u0435\u043C, \u0434\u043E\u043B\u0436\u043D\u043E \u0431\u044B\u0442\u044C \u0440\u043E\u0436\u0434\u0435\u043D\u043E \u0438\u0437 \u043D\u0435\u0433\u043E. \u042F \u0432\u044B\u0440\u0430\u0441\u0442\u0438\u043B\u0430 \u0442\u0430\u043A\u0438\u0435 \u0432\u0435\u0449\u0438. \u042F \u0438\u0445 \u0435\u043B\u0430, \u0447\u0442\u043E\u0431\u044B \u0437\u043D\u0430\u0442\u044C \u043D\u0430\u0432\u0435\u0440\u043D\u044F\u043A\u0430. \u0415\u0441\u043B\u0438 \u043D\u0435 \u0432\u0435\u0440\u043D\u0443\u0441\u044C \u043A \u043D\u043E\u0432\u043E\u043B\u0443\u043D\u0438\u044E \u2014 \u043D\u0435 \u0438\u0449\u0438\u0442\u0435 \u043C\u0435\u043D\u044F; \u0430 \u0435\u0441\u043B\u0438 \u043F\u0440\u0438\u0434\u0451\u0442\u0441\u044F \u2014 \u0438\u0434\u0438\u0442\u0435 \u0441 \u043E\u0433\u043D\u0451\u043C. \u2014 \u041C.\u0412.\xBB \u0421\u0432\u044F\u0437\u043A\u0430 \u0441\u0443\u0448\u0451\u043D\u044B\u0445 \u0433\u043D\u0438\u043B\u043E\u0433\u0440\u0438\u0431\u043E\u0432 \u0432\u0441\u0451 \u0435\u0449\u0451 \u0432\u0438\u0441\u0438\u0442 \u043D\u0430\u0434 \u0432\u0435\u0440\u0441\u0442\u0430\u043A\u043E\u043C, \u0430 \u043F\u043E\u0434 \u043D\u0435\u0439 \u2014 \u0434\u043E\u0431\u0440\u044B\u0435 \u0441\u0435\u0440\u0435\u0431\u0440\u044F\u043D\u044B\u0435 \u043D\u043E\u0436\u043D\u0438\u0446\u044B \u041C\u0430\u0442\u0443\u0448\u043A\u0438 \u0412\u0438\u0441\u0442\u044B."},"maren-of-greyhollow":{title:"\u041C\u0430\u0440\u0435\u043D \u0438\u0437 \u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443",text:"\u0421\u0433\u043E\u0440\u0431\u043B\u0435\u043D\u043D\u0430\u044F \u0436\u0435\u043D\u0449\u0438\u043D\u0430 \u0443 \u0442\u043E\u0440\u0444\u044F\u043D\u043E\u0433\u043E \u043E\u0433\u043D\u044F \u2014 \u044D\u0442\u043E \u041C\u0430\u0440\u0435\u043D, \u0447\u0442\u043E \u0434\u0435\u0440\u0436\u0438\u0442 \u043E\u0441\u0442\u0430\u0442\u043A\u0438 \u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443 \u043D\u0430 \u043C\u0430\u0437\u044F\u0445 \u0438 \u0443\u043F\u0440\u044F\u043C\u0441\u0442\u0432\u0435. \u0421\u043E\u0440\u043E\u043A \u043B\u0435\u0442 \u043E\u043D\u0430 \u043F\u0440\u0430\u0432\u0438\u043B\u0430 \u043A\u043E\u0441\u0442\u0438 \u0438 \u0441\u0431\u0438\u0432\u0430\u043B\u0430 \u0436\u0430\u0440 \u043D\u0430 \u044D\u0442\u043E\u0439 \u0441\u0442\u0430\u043D\u0446\u0438\u0438 \u0438 \u043D\u0430\u043C\u0435\u0440\u0435\u043D\u0430 \u0434\u0435\u043B\u0430\u0442\u044C \u044D\u0442\u043E \u0438 \u0432\u043F\u0440\u0435\u0434\u044C \u2014 \u043F\u043E\u043A\u0430 \u0433\u043D\u0438\u043B\u044C \u043D\u0435 \u0437\u0430\u0431\u0435\u0440\u0451\u0442 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u0435\u0433\u043E \u0438\u0437 \u043D\u0438\u0445 \u0438\u043B\u0438 \u0425\u0440\u0430\u043D\u0438\u0442\u0435\u043B\u0438 \u0435\u0451 \u043D\u0435 \u043F\u043E\u0433\u0430\u0441\u044F\u0442. \u041E\u043D\u0430 \u043D\u0435 \u043F\u043B\u0430\u0447\u0435\u0442 \u043E \u0442\u0440\u043E\u0438\u0445, \u0431\u0435\u0436\u0430\u0432\u0448\u0438\u0445 \u043D\u0430 \u044E\u0433 \u0434\u043E \u043F\u0440\u0438\u0445\u043E\u0434\u0430 \u041A\u043B\u044F\u0442\u0432\u044B \u2014 \u0440\u0435\u0437\u0447\u0438\u0446\u0435 \u0442\u0440\u043E\u0441\u0442\u043D\u0438\u043A\u0430 \u0441 \u0434\u043E\u0447\u0435\u04 u043D\u0430\u044F \u0432\u043E\u0434\u043E\u0439 \u043A\u043D\u0438\u0436\u043A\u0430 \u0441 \u043A\u0430\u0440\u0442\u0438\u043D\u043A\u0430\u043C\u0438, \u043A\u043E\u0442\u043E\u0440\u043E\u0439 \u043A\u043E\u0433\u0434\u0430-\u0442\u043E \u0443\u0447\u0438\u043B\u0438 \u043A\u0430\u0436\u0434\u043E\u0433\u043E \u0440\u0435\u0431\u0451\u043D\u043A\u0430. \xAB\u0410\u043B\u0434\u0435\u0440\u043C\u0443\u0440 \u2014 \u0437\u0435\u043B\u0451\u043D\u043E\u0435 \u043A\u043E\u0440\u043E\u043B\u0435\u0432\u0441\u0442\u0432\u043E \u043F\u044F\u0442\u0438 \u0442\u0432\u0435\u0440\u0434\u044B\u043D\u044C: \u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443 \u043D\u0430 \u0432\u0435\u0440\u0435\u0441\u043A\u0435, \u0414\u0440\u043E\u0443\u043D\u043A\u0440\u043E\u0441\u0441 \u0432 \u0431\u043E\u043B\u043E\u0442\u0435, \u042D\u0448\u0440\u0438\u0447 \u043F\u043E\u0434 \u0446\u0438\u0442\u0430\u0434\u0435\u043B\u044C\u044E, \u0438 \u0420\u0430\u0439\u043C\u0445\u043E\u043B\u0434 \u0438 \u0421\u044D\u0439\u0431\u043B\u0444\u0435\u043D \u043D\u0430 \u0434\u0438\u043A\u0438\u0445 \u043A\u0440\u0430\u044F\u0445. \u0415\u0433\u043E \u0440\u0435\u043A\u0438 \u0442\u0435\u043A\u0443\u0442 \u043A \u0425\u043E\u043B\u043E\u0434\u043D\u043E\u043C\u0443 \u043C\u043E\u0440\u044E; \u0435\u0433\u043E \u043A\u0443\u0440\u0433\u0430\u043D\u044B \u0445\u0440\u0430\u043D\u044F\u0442 \u0435\u0433\u043E \u043A\u043E\u0440\u043E\u043B\u0435\u0439. \u0411\u0443\u0434\u044C \u0434\u043E\u0431\u0440 \u043A \u0441\u0442\u0430\u0440\u044B\u043C \u0434\u043E\u0440\u043E\u0433\u0430\u043C, \u0438\u0431\u043E \u043E\u043D\u0438 \u043F\u043E\u043C\u043D\u044F\u0442 \u0442\u0432\u043E\u0438 \u043D\u043E\u0433\u0438\xBB. \u041A\u0442\u043E-\u0442\u043E \u0434\u0435\u0442\u0441\u043A\u043E\u0439 \u0442\u044F\u0436\u0451\u043B\u043E\u0439 \u0440\u0443\u043A\u043E\u0439 \u0437\u0430\u0447\u0435\u0440\u043A\u043D\u0443\u043B \xAB\u0437\u0435\u043B\u0451\u043D\u043E\u0435\xBB \u0438 \u043D\u0430\u043F\u0438\u0441\u0430\u043B \u043F\u0440\u043E\u0441\u0442\u043E: \xAB\u0442\u0435\u043F\u0435\u0440\u044C \u0441\u0435\u0440\u043E\u0435\xBB."},"greyhollow-ledger":{title:"\u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443\u0441\u043A\u0430\u044F \u0441\u0447\u0451\u0442\u043D\u0430\u044F \u043A\u043D\u0438\u0433\u0430",text:"\u0420\u0430\u0441\u0447\u0451\u0442\u043D\u0430\u044F \u043A\u043D\u0438\u0433\u0430 \u0441\u0442\u0430\u043D\u0446\u0438\u0438, \u0447\u0442\u043E \u0432\u0435\u043B\u0430\u0441\u044C \u0430\u043A\u043A\u0443\u0440\u0430\u0442\u043D\u043E\u0439 \u043A\u0443\u043F\u0435\u0447\u0435\u0441\u043A\u043E\u0439 \u0440\u0443\u043A\u043E\u0439, \u0430 \u0437\u0430\u0442\u0435\u043C, \u0432\u043D\u0435\u0437\u0430\u043F\u043D\u043E, \u0440\u0443\u043A\u043E\u0439 \u041C\u0430\u0440\u0435\u043D. \u0420\u0430\u043D\u043D\u0438\u0435 \u0441\u0442\u0440\u0430\u043D\u0438\u0446\u044B \u0441\u0447\u0438\u0442\u0430\u044E\u0442 \u043A\u0430\u0440\u0430\u0432\u0430\u043D\u044B: \u0441\u043E\u043B\u044C \u0438 \u0448\u0435\u0440\u0441\u0442\u044C \u043D\u0430 \u0441\u0435\u0432\u0435\u0440, \u0438\u0437\u0434\u0435\u043B\u0438\u044F \u0438\u0437 \u0436\u0435\u043B\u0435\u0437\u0430 \u0438 \u0441\u0432\u0435\u0447\u0438 \u043D\u0430 \u044E\u0433, \u043F\u043E\u0448\u043B\u0438\u043D\u0430 \u0432 \u043E\u0434\u043D\u0443 \u043D\u043E\u0447\u044C \u043D\u043E\u0447\u043B\u0435\u0433\u0430, \u043F\u0440\u0438\u0447\u0438\u0442\u0430\u044E\u0449\u0430\u044F\u0441\u044F \u0434\u043E\u0440\u043E\u0433\u0435. \u041F\u043E\u0437\u0434\u043D\u0438\u0435 \u0441\u0442\u0440\u0430\u043D\u0438\u0446\u044B \u0441\u0447\u0438\u0442\u0430\u044E\u0442 \u0434\u0440\u0443\u0433\u043E\u0435 \u2014 \u043C\u0435\u0448\u043A\u0438 \u0441\u0435\u043C\u0435\u043D\u043D\u043E\u0433\u043E \u0437\u0435\u0440\u043D\u0430, \u0447\u0442\u043E \u0432\u0437\u043E\u0448\u043B\u0438 \u043F\u0435\u043F\u043B\u043E\u043C, \u0434\u0430\u0442\u0443, \u043A\u043E\u0433\u0434\u0430 \u043D\u0435 \u0 44F\u0435\u0442\u0435 \u0435\u0451 \u2014 \u043F\u043E\u0447\u0442\u0438 \u0443\u043C\u0438\u0440\u043E\u0442\u0432\u043E\u0440\u0451\u043D\u043D\u043E\u0439. \u0422\u0440\u043E\u0435 \u0438\u0441\u043A\u0430\u043B\u0438 \u0433\u043D\u0438\u043B\u044C \u043F\u043E\u0436\u0438\u0436\u0435 \u043D\u0430 \u044E\u0433\u0435 \u0438 \u043D\u0430\u0448\u043B\u0438 \u043B\u0438\u0448\u044C \u0435\u0449\u0451 \u0431\u043E\u043B\u044C\u0448\u0435 \u0435\u0451; \u0432\u044B \u0434\u0430\u043B\u0438 \u0432\u0441\u0435\u043C \u0442\u0440\u043E\u0438\u043C \u0435\u0434\u0438\u043D\u0441\u0442\u0432\u0435\u043D\u043D\u044B\u0439 \u043A\u043E\u043D\u0435\u0446, \u0447\u0442\u043E \u043E\u0441\u0442\u0430\u0432\u0438\u043B\u0430 \u0433\u043D\u0438\u043B\u044C. \u041C\u0430\u0440\u0435\u043D \u0437\u0430\u0445\u043E\u0447\u0435\u0442 \u0437\u043D\u0430\u0442\u044C, \u0447\u0435\u043C \u043A\u043E\u043D\u0447\u0438\u043B\u0430\u0441\u044C \u0438\u0445 \u0438\u0441\u0442\u043E\u0440\u0438\u044F. \u041E\u043D\u0430 \u043D\u0435 \u043F\u043E\u0431\u043B\u0430\u0433\u043E\u0434\u0430\u0440\u0438\u0442 \u0432\u0430\u0441 \u0437\u0430 \u044D\u0442\u043E. \u041D\u043E \u043E\u043D\u0430 \u0431\u0443\u0434\u0435\u0442 \u0437\u043D\u0430\u0442\u044C \u2014 \u0438 \u0443 \u043C\u0451\u0440\u0442\u0432\u044B\u0445 \u0431\u0443\u0434\u0435\u0442 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u044F\u044F \u0441\u0442\u0440\u0430\u043D\u0438\u0446\u0430.",choices:["\u0412\u0435\u0440\u043D\u0443\u0442\u044C\u0441\u044F \u0432 \u0437\u0430\u043B"]},keep3:{title:"\u041A\u0443\u0440\u0433\u0430\u043D\u043D\u044B\u0439 \u0422\u0440\u043E\u043D",text:`\u0422\u0440\u043E\u043D\u043D\u044B\u0439 \u0437\u0430\u043B \u2014 \u044D\u0442\u043E \u043A\u0443\u0440\u0433\u0430\u043D, \u0440\u0430\u0441\u043A\u0440\u044B\u0442\u044B\u0439 \u043D\u0435\u0431\u0443. \u041D\u0430 \u0441\u0438\u0434\u0435\u043D\u044C\u0435 \u0438\u0437 \u043A\u043E\u0440\u043D\u044F \u0438 \u043A\u043E\u0441\u0442\u0438 \u0432\u043E\u0441 u0440\u0430\u0439",text:"\u0422\u0440\u043E\u043F\u0430 \u043D\u0430 \u0437\u0430\u043F\u0430\u0434 \u0443\u0445\u043E\u0434\u0438\u0442 \u0432 \u043A\u0440\u0430\u0439 \u0447\u0451\u0440\u043D\u043E\u0439 \u0432\u043E\u0434\u044B \u0438 \u0431\u043B\u0435\u0434\u043D\u044B\u0445 \u0433\u0440\u0438\u0431\u043E\u0432. \u041D\u0430 \u043A\u043E\u0447\u043A\u0435 \u0441\u0443\u0445\u043E\u0433\u043E \u0442\u043E\u0440\u0444\u0430 \u0441\u0442\u0430\u0440\u044B\u0439 \u0440\u0435\u0437\u0447\u0438\u043A \u043F\u043E \u0438\u043C\u0435\u043D\u0438 \u0421\u0435\u0434\u0436 \u043F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0435\u0442 \u0434\u044B\u043C\u043D\u044B\u0439 \u043A\u043E\u0441\u0442\u0435\u0440\u043E\u043A \u043F\u0440\u043E\u0442\u0438\u0432 \u0441\u043F\u043E\u0440. \xAB\u041C\u0430\u0442\u0443\u0448\u043A\u0430 \u0412\u0438\u0441\u0442\u0430 \u043E\u0434\u043D\u0430\u0436\u0434\u044B \u0441\u0431\u0438\u043B\u0430 \u043C\u043D\u0435 \u0436\u0430\u0440, \u0433\u043E\u0434\u044B \u043D\u0430\u0437\u0430\u0434, \u2014 \u0434\u043E\u0431\u0440\u0430\u044F \u0436\u0435\u043D\u0449\u0438\u043D\u0430, \u2014 \u0433\u043E\u0432\u043E\u0440\u0438\u0442 \u043E\u043D, \u043D\u0435 \u043F\u043E\u0434\u043D\u0438\u043C\u0430\u044F \u0433\u043B\u0430\u0437. \u2014 \u041E\u043D\u0430 \u0443\u0448\u043B\u0430 \u0442\u0443\u0434\u0430 \u0441\u0435\u0437\u043E\u043D \u043D\u0430\u0437\u0430\u0434, \u0432 \u043F\u043E\u0433\u043E\u043D\u0435 \u0437\u0430 \u043B\u0435\u043A\u0430\u0440\u0441\u0442\u0432\u043E\u043C \u043E\u0442 \u0441\u0435\u0440\u043E\u0439 \u0433\u043D\u0438\u043B\u0438. \u0422\u0435\u043F\u0435\u0440\u044C \u0442\u0430\u043C \u043D\u0435\u0447\u0442\u043E \u0432 \u043A\u043E\u0440\u043E\u043D\u0435 \u0438\u0437 \u0433\u0440\u0438\u0431\u043E\u0432 \u0441\u0442\u0435\u0440\u0435\u0436\u0451\u0442 \u0435\u0451 \u0441\u0430\u0434. \u0415\u0441\u043B\u0438 \u043E\u043D\u0430 \u0435\u0449\u0451 \u0433\u0434\u0435-\u0442\u043E \u0442\u0430\u043C, \u0441\u0430\u043C\u043E\u0435 \u0434\u043E\u0431\u0440\u043E\u0435 \u2014 \u0443\u043F\u043E\u043A\u043E\u0438\u0442\u044C \u044D\u0442\u043E\xBB.",choices:["\u0421\u043F\u0440\u043E\u0441\u0438\u0442\u044C \u0421\u0435\u0434\u0436\u0430, \u0447\u0442\u043E \u043E\u043D \u0437\u043D\u0430\u0435\u0442","\u0412\u043E\u0439\u0442\u0438 \u0432 \u0442\u043E\u043F\u044C","\u0412\u0435\u0440\u043D\u0443\u0442\u044C\u0441\u044F \u0432 \u0413\u0440\u0435\u0439\u0445\u043E\u043B\u043B\u043E\u0443"]},fen_sedge:{title:"\u0420\u0430\u0441\u0441\u043A\u0430\u0437 \u0421\u0435\u0434\u0436\u0430",text:"\xAB\u041E\u043D\u0430 \u043D\u0435 \u0431\u044B\u043B\u0430 \u0431\u0435\u0437\u0443\u043C\u043D\u0430, \u0447\u0442\u043E \u0431\u044B \u043D\u0438 \u0433\u043E\u0432\u043E\u0440\u0438\u043B\u0438. \u0423 \u043D\u0435\u0451 \u0431\u044B\u043B\u0430 \u043C\u044B\u0441\u043B\u044C, \u0447\u0442\u043E \u043B\u0435\u043A\u0430\u0440\u0441\u0442\u0432\u043E \u043E\u0442 \u0433\u043D\u0438\u043B\u0438 \u0434\u043E\u043B\u0436\u043D\u043E \u0431\u044B\u0442\u044C \u0441\u0434\u0435\u043B\u0430\u043D\u043E \u0438\u0437 \u0433\u043D\u0438\u043B\u0438 \u2014 \u0447\u0442\u043E \u044F\u0434 \u0431\u044C\u044E\u0442 \u044F\u0434\u043E\u043C \u043F\u043E\u043C\u0435\u043D\u044C\u0448\u0435. \u0421\u0434\u0430\u0451\u0442\u0441\u044F \u043C\u043D\u0435, \u043E\u043D\u0430 \u0431\u044B\u043B\u0430 \u043F\u0440\u0430\u0432\u0430, \u0438 \u0441\u0434\u0430\u0451\u0442\u0441\u044F \u043C\u043D\u0435, \u043E\u043D\u043E \u0435\u0451 \u0432\u0441\u0451 \u0440\u0430\u0432\u043D\u043E \u0441\u043E\u0436\u0440\u0430\u043B\u043E\xBB. \u041E\u043D \u0432\u043E\u0440\u043E\u0448\u0438\u0442 \u043A\u043E\u0441\u0442\u0435\u0440\u043E\u043A. \xAB\u0412\u0435\u043D\u0447\u0430\u043D\u043D\u0430\u044F \u0442\u0432\u0430\u0440\u044C \u043D\u0435 \u043B\u044E\u0431\u0438\u0442 \u043E\u0433\u043D\u044F. \u041E\u043D\u043E \u0438 \u043F\u043E\u043D\u044F\u0442\u043D\u043E \u2014 \u043E\u0433\u043E\u043D\u044C \u0435\u0434\u0438\u043D\u0441\u0442\u0432\u0435\u043D\u043D\u043E\u0435, \u0447\u0442\u043E \u043A\u043E\u0433\u0434\u0430-\u043B\u0438\u0431\u043E \u0447\u0438\u0441\u0442\u0438\u043B\u043E \u044D\u0442\u0443 \u0442\u043E\u043F\u044C. \u041F\u043E\u0434\u043D\u0435\u0441\u0438 \u043A \u043D\u0435\u0439 \u0444\u0430\u043A\u0435\u043B, \u043A\u043E\u043B\u0438 \u0445\u0432\u0430\u0442\u0438\u0442 \u0443\u043C\u0430\xBB.",choices:["\u0428\u0430\u0433\u043D\u0443\u0442\u044C \u0432 \u0442\u043E\u043F\u044C"]},fen_path:{title:"\u0417\u0430\u0442\u043E\u043D\u0443\u0432\u0448\u0430\u044F \u0433\u0430\u0442\u044C",text:"\u0413\u0430\u0442\u044C \u0438\u0437 \u043F\u043E\u043B\u0443\u0443\u0442\u043E\u043D\u0443\u0432\u0448\u0438\u0445 \u0431\u0440\u0451\u0432\u0435\u043D \u0432\u044C\u0451\u0442\u0441\u044F \u043C\u0435\u0436 \u043E\u043C\u0443\u0442\u043E\u0432. \u041F\u043E \u043E\u0434\u043D\u0443 \u0441\u0442\u043E\u0440\u043E\u043D\u0443 \u0442\u0435\u0441\u043D\u0438\u0442\u0441\u044F \u0442\u0440\u043E\u0441\u0442\u043D\u0438\u043A \u0432\u044B\u0448\u0435 \u0447\u0435\u043B\u043E\u0432\u0435\u043A\u0430; \u043F\u043E \u0434\u0440\u0443\u0433\u0443\u044E \u043A\u0440\u044B\u0448\u0430 \u0437\u0430\u0442\u043E\u043F\u043B\u0435\u043D\u043D\u043E\u0439 \u043F\u0435\u0440\u0435\u0433\u043E\u043D\u043D\u043E\u0439 \u0440\u0430\u0437\u0431\u0438\u0432\u0430\u0435\u0442 \u0432\u043E\u0434\u0443 \u2014 \u0431\u044B\u0442\u044C \u043C\u043E\u0436\u0435\u0442, \u041C\u0430\u0442\u0443\u0448\u043A\u0438 \u0412\u0438\u0441\u0442\u044B, \u0438 \u0441\u0442\u043E\u0438\u0442 \u0432\u0437\u0433\u043B\u044F\u0434\u0430.",choices:["\u041F\u0440\u043E\u0431\u0440\u0430\u0442\u044C\u0441\u044F \u043F\u043E \u0437\u0430\u0442\u043E\u043D\u0443\u0432\u0448\u0435\u0439 \u0433\u0430\u0442\u0438 (\u041B\u043E\u0432\u043A\u043E\u0441\u0442\u044C, \u0421\u041B 13)","\u041F\u0440\u043E\u043B\u043E\u043C\u0438\u0442\u044C \u043F\u0443\u0442\u044C \u0441\u043A\u0432\u043E\u0437\u044C \u0442\u0440\u043E\u0441\u0442\u043D\u0438\u043A (\u0421\u0438\u043B\u0430, \u0421\u041B 13)","\u041E\u0431\u044B\u0441\u043A\u0430\u0442\u044C \u0437\u0430\u0442\u043E\u043F\u043B\u0435\u043D\u043D\u0443\u044E \u043F\u0435\u0440\u0435\u0433\u043E\u043D\u043D\u0443\u044E (\u0420\u0430\u0437\u0443\u043C, \u0421\u041B 14)"]},fen_hurt:{title:"\u0412 \u0442\u0440\u044F\u0441\u0438\u043D\u0443",text:"\u0411\u0440\u0435\u0432\u043D\u043E \u043F\u0440\u043E\u0432\u043E\u0440\u0430\u0447\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043F\u043E\u0434 \u043D\u043E\u0433\u043E\u0439, \u0438 \u043A\u0442\u043E-\u0442\u043E \u0443\u0445\u043E\u0434\u0438\u0442 \u0432 \u0432\u043E\u0434\u0443 \u043F\u043E \u0433\u0440\u0443\u0434\u044C, \u0432\u044B\u043D\u044B\u0440\u0438\u0432\u0430\u044F, \u043A\u0430\u0448\u043B\u044F\u044F \u0438 \u0441\u043A\u043B\u0438\u0437\u043A\u0438\u0439 \u043E\u0442 \u0433\u043D\u0438\u043B\u0438, \u043F\u0440\u0435\u0436\u0434\u0435 \u0447\u0435\u043C \u0432\u044B \u0432\u044B\u0442\u0430\u0441\u043A\u0438\u0432\u0430\u0435\u0442\u0435 \u0435\u0433\u043E. \u0412\u044B \u0438\u0434\u0451\u0442\u0435 \u0434\u0430\u043B\u044C\u0448\u0435, \u043F\u0435\u0440\u0435\u043F\u0430\u0447\u043A\u0430\u043D\u043D\u044B\u0435 \u0438 \u043F\u043E\u0442\u0440\u044F\u0441\u0451\u043D\u043D\u044B\u0435.",choices:["\u0418\u0434\u0442\u0438 \u0433\u043B\u0443\u0431\u0436\u0435"]},fen_secret:{title:"\u0417\u0430\u0442\u043E\u043F\u043B\u0435\u043D\u043D\u0430\u044F \u043F\u0435\u0440\u0435\u0433\u043E\u043D\u043D\u0430\u044F",text:"\u041F\u0435\u0440\u0435\u0433\u043E\u043D\u043D\u0430\u044F \u0441\u0442\u043E\u0438\u0442 \u043F\u043E \u0441\u0430\u043C\u044B\u0435 \u043E\u043A\u043D\u0430 \u0432 \u0447\u0451\u0440\u043D\u043E\u0439 \u0432\u043E\u0434\u0435, \u0431\u0430\u043D\u043A\u0438 \u043D\u0430 \u0435\u0451 \u043F\u043E\u043B\u043A\u0430\u0445 \u043F\u043E\u0440\u043E\u0441\u043B\u0438 \u0437\u0435\u043B\u0451\u043D\u044B\u043C \u043F\u0443\u0448\u043A\u043E\u043C. \u0412\u044B \u0431\u0435\u0440\u0451\u0442\u0435 \u0442\u043E, \u0447\u0442\u043E \u0442\u043E\u043F\u0438 \u0431\u0435\u0437 \u043D\u0430\u0434\u043E\u0431\u043D\u043E\u0441\u0442\u0438: \u043C\u043E\u043D\u0435\u0442\u044B \u0432 \u0436\u0435\u0441\u0442\u044F\u043D\u043A\u0435, \u0434\u043E\u0431\u0440\u044B\u0435 \u0441\u0435\u0440\u0435\u0431\u0440\u044F\u043D\u044B\u0435 \u043D\u043E\u0436\u043D\u0438\u0446\u044B \u041C\u0430\u0442\u0443\u0448\u043A\u0438 \u0412\u0438\u0441\u0442\u044B \u2014 \u0438 \u0435\u0451 \u0436\u0443\u0440\u043D\u0430\u043B, \u0447\u0442\u043E \u0433\u043E\u0432\u043E\u0440\u0438\u0442 \u0432\u0430\u043C, \u0447\u0435\u043C \u043E\u043D\u0430 \u0441\u0442\u0430\u043B\u0430.",choices:["\u0418\u0434\u0442\u0438 \u0433\u043B\u0443\u0431\u0436\u0435"]},fen_pools:{title:"\u0421\u043F\u043E\u0440\u043E\u0432\u044B\u0435 \u043E\u043C\u0443\u0442\u044B",text:"\u0413\u0430\u0442\u044C \u0432\u044B\u0432\u043E\u0434\u0438\u0442 \u043A \u043A\u043E\u0442\u043B\u043E\u0432\u0438\u043D\u0435 \u0442\u0438\u0445\u0438\u0445 \u043E\u043C\u0443\u0442\u043E\u0432, \u043E\u0441\u0432\u0435\u0449\u0451\u043D\u043D\u044B\u0445 \u0434\u0440\u0435\u0439\u0444\u0443\u044E\u0449\u0438\u043C\u0438 \u043E\u0431\u043B\u0430\u043A\u0430\u043C\u0438 \u0441\u043F\u043E\u0440. \u0411\u043B\u0435\u0434\u043D\u044B\u0435 \u0442\u0435\u043D\u0438 \u0440\u0430\u0441\u043F\u0440\u044F\u043C\u043B\u044F\u044E\u0442\u0441\u044F \u0438\u0437 \u0442\u0438\u043D\u044B, \u0438 \u0441\u0430\u043C \u0432\u043E\u0437\u0434\u0443\u0445 \u0441\u043B\u043E\u0432\u043D\u043E \u043F\u043E\u0432\u043E\u0440\u0430\u0447\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043A \u0442\u0435\u043F\u043B\u0443 \u0436\u0438\u0432\u043E\u0433\u043E.",choices:["\u041F\u0440\u043E\u0440\u0443\u0431\u0438\u0442\u044C \u043F\u0443\u0442\u044C"]},fen_deep:{title:"\u0413\u0434\u0435 \u0442\u043E\u043D\u0435\u0442 \u0442\u0440\u043E\u0441\u0442\u043D\u0438\u043A",text:"\u0422\u0440\u043E\u0441\u0442\u043D\u0438\u043A \u0440\u0435\u0434\u0435\u0435\u0442 \u0434\u043E \u043A\u043E\u043B\u044C\u0446\u0430 \u043C\u0451\u0440\u0442\u0432\u044B\u0445 \u0438\u0432, \u0443\u0432\u0435\u0448\u0430\u043D\u043D\u044B\u0445 \u0436\u0438\u0440\u043D\u044B\u043C\u0438 \u0433\u043D\u0438\u043B\u043E\u0433\u0440\u0438\u0431\u0430\u043C\u0438, \u0430 \u0437\u0430 \u043D\u0438\u043C\u0438 \u2014 \u043A\u043E\u0447\u043A\u0430, \u0443\u0432\u0435\u043D\u0447\u0430\u043D\u043D\u0430\u044F \u0433\u0440\u0438\u0431\u043E\u043C, \u0438 \u043A\u043E\u043B\u0435\u043D\u043E\u043F\u0440\u0435\u043A\u043B\u043E\u043D\u0451\u043D\u043D\u044B\u0439 \u0441\u0438\u043B\u0443\u044D\u0442. \u0415\u0451 \u043D\u0435\u0432\u043E\u043B\u044C\u043D\u0438\u043A\u0438 \u043F\u043E\u0434\u043D\u0438\u043C\u0430\u044E\u0442\u0441\u044F \u0438\u0437 \u0432\u043E\u0434\u044B \u043F\u0435\u0440\u0432\u044B\u043C\u0438, \u0447\u0442\u043E\u0431\u044B \u043F\u0440\u043E\u0434\u043B\u0438\u0442\u044C \u0434\u043E\u0437\u043E\u0440 \u0435\u0449\u0451 \u043D\u0430 \u043C\u0438\u0433.",choices:["\u0421\u043E\u0431\u0440\u0430\u0442\u044C \u0433\u043D\u0438\u043B\u043E\u0433\u0440\u0438\u0431\u044B \u0441 \u043C\u0451\u0440\u0442\u0432\u044B\u0445 \u0438\u0432","\u041F\u0440\u0438\u0431\u043B\u0438\u0437\u0438\u0442\u044C\u0441\u044F \u043A \u0432\u0435\u043D\u0447\u0430\u043D\u043D\u043E\u0439 \u0444\u0438\u0433\u0443\u0440\u0435"]},fen_boss:{title:"\u0413\u043D\u0438\u043B\u043E\u0443\u0432\u0435\u043D\u0447\u0430\u043D\u043D\u0430\u044F",text:"\u041D\u0430 \u043A\u043E\u0447\u043A\u0435 \u043A\u043E\u043B\u0435\u043D\u043E\u043F\u0440\u0435\u043A\u043B\u043E\u043D\u0451\u043D\u043D\u043E \u0437\u0430\u0441\u0442\u044B\u043B\u0430 \u0444\u0438\u0433\u0443\u0440\u0430 \u0432 \u043F\u043B\u0430\u0442\u044C\u0435 \u0438\u0437 \u043C\u0445\u0430 \u0438 \u0431\u043E\u043B\u043E\u0442\u043D\u043E\u0433\u043E \u043F\u0443\u0445\u0430, \u043A\u043E\u0440\u043E\u043D\u0430 \u0438\u0437 \u0431\u043B\u0435\u0434\u043D\u044B\u0445 \u0433\u04
