<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0e0b14" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dicebound" />
<title>Dicebound: The Hollow Crown</title>
<style>:root {
  --bg: #0e0b14;
  --bg2: #16111f;
  --panel: #1d1628;
  --panel2: #261d35;
  --ink: #e7dcc8;
  --ink-dim: #a596b0;
  --gold: #e8b659;
  --gold-dim: #9c7a33;
  --blood: #b6402f;
  --hp: #c44; --hp2: #e76;
  --focus: #4aa3d6; --focus2: #6cc6f0;
  --xp: #8a6; --good: #6cba6c; --bad: #d4604f;
  --line: #352a47;
  --radius: 14px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: radial-gradient(120% 100% at 50% 0%, #1a1326 0%, var(--bg) 60%);
  color: var(--ink);
  font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  user-select: none;
}

#app {
  max-width: 920px;
  margin: 0 auto;
  min-height: 100%;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  display: flex;
  flex-direction: column;
}

h1, h2, h3 { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; margin: 0 0 .4em; letter-spacing: .3px; }
.title-serif { font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif; }

.screen { padding: 18px 16px 28px; flex: 1; display: flex; flex-direction: column; gap: 14px; animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ---------- Title ---------- */
.title-wrap { text-align: center; margin-top: 8vh; }
.title-wrap .crest { font-size: 68px; filter: drop-shadow(0 4px 10px #000a); }
.title-wrap h1 { font-size: 38px; color: var(--gold); text-shadow: 0 2px 0 #000, 0 0 22px #e8b65955; }
.title-wrap .sub { color: var(--ink-dim); font-style: italic; letter-spacing: 2px; text-transform: uppercase; font-size: 12px; }
.title-actions { margin-top: 26px; display: flex; flex-direction: column; gap: 12px; align-items: center; }

/* ---------- Buttons ---------- */
.btn {
  appearance: none; border: 1px solid var(--gold-dim);
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  color: var(--ink); padding: 13px 18px; border-radius: 12px; font-size: 16px; font-weight: 600;
  cursor: pointer; min-width: 220px; text-align: center; transition: transform .06s, box-shadow .15s, border-color .15s;
  box-shadow: 0 2px 0 #0007, inset 0 1px 0 #ffffff0c;
}
.btn:active { transform: translateY(1px); }
.btn.primary { border-color: var(--gold); background: linear-gradient(180deg, #5a4423, #3a2c18); color: var(--gold); }
.btn.full { width: 100%; min-width: 0; }
.btn.small { min-width: 0; padding: 8px 12px; font-size: 14px; border-radius: 10px; }
.btn.ghost { background: #1a1426; border-color: var(--line); }
.btn:disabled { opacity: .42; cursor: not-allowed; }
.btn.danger { border-color: var(--blood); color: #f0a99c; }

.row { display: flex; gap: 10px; flex-wrap: wrap; }
.row.center { justify-content: center; }
.spacer { flex: 1; }
.hidden { display: none !important; }
.dim { color: var(--ink-dim); }
.gold-text { color: var(--gold); font-weight: 700; }
.tag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 999px; background: #2a2238; border: 1px solid var(--line); color: var(--ink-dim); }

/* ---------- Panels / cards ---------- */
.panel { background: linear-gradient(180deg, var(--panel), var(--bg2)); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; box-shadow: 0 6px 18px #0006; }
.card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
.banner-art { font-size: 46px; text-align: center; filter: drop-shadow(0 3px 8px #000a); }
.story-text { white-space: pre-wrap; line-height: 1.55; color: var(--ink); }

.topbar { display: flex; align-items: center; gap: 12px; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--line); background: #120d1c; position: sticky; top: 0; z-index: 5; }
.topbar .coins { color: var(--gold); font-weight: 700; }
.topbar .links { display: flex; gap: 8px; }

/* ---------- Class select ---------- */
.class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.class-card { text-align: left; cursor: pointer; border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: var(--panel); transition: border-color .15s, transform .06s; }
.class-card:active { transform: translateY(1px); }
.class-card.sel { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset, 0 0 16px #e8b65933; }
.class-card .cname { color: var(--gold); font-weight: 700; font-size: 17px; }
.class-card .cblurb { color: var(--ink-dim); font-size: 13px; margin-top: 4px; line-height: 1.4; }
.class-card .cstats { font-size: 11px; color: var(--ink-dim); margin-top: 6px; }
.slot-row { display: flex; gap: 8px; flex-wrap: wrap; }
.slot { flex: 1; min-width: 120px; border: 1px dashed var(--line); border-radius: 10px; padding: 8px; text-align: center; font-size: 13px; }
.slot.filled { border-style: solid; border-color: var(--gold-dim); }

/* ---------- Bars ---------- */
.bar { height: 9px; border-radius: 6px; background: #0c0913; overflow: hidden; border: 1px solid #00000055; }
.bar > span { display: block; height: 100%; transition: width .35s ease; }
.bar.hp > span { background: linear-gradient(90deg, var(--hp), var(--hp2)); }
.bar.focus > span { background: linear-gradient(90deg, var(--focus), var(--focus2)); }
.bar.xp > span { background: linear-gradient(90deg, #6a8a4a, var(--xp)); }
.bar.boss { height: 13px; }

/* ---------- Combat ---------- */
.combat { display: flex; flex-direction: column; gap: 10px; }
.enemy-zone, .party-zone { display: grid; gap: 8px; }
.enemy-zone { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
.party-zone { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
.unit { border: 1px solid var(--line); border-radius: 12px; padding: 10px; background: var(--panel); position: relative; transition: box-shadow .15s, border-color .15s, transform .15s; }
.unit.enemy { background: linear-gradient(180deg, #241620, #18101a); }
.unit.active { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset, 0 0 18px #e8b65944; }
.unit.targetable { cursor: pointer; border-color: var(--blood); box-shadow: 0 0 0 1px var(--blood) inset; animation: pulse 1s infinite; }
.unit.heal-target { border-color: var(--good); box-shadow: 0 0 0 1px var(--good) inset; cursor: pointer; }
.unit.dead { opacity: .4; filter: grayscale(1); }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 1px var(--blood) inset, 0 0 6px #b6402f55; } 50% { box-shadow: 0 0 0 1px var(--blood) inset, 0 0 18px #b6402faa; } }
.unit .uname { font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
.unit .uname .lvl { font-size: 11px; color: var(--ink-dim); font-weight: 500; }
.unit . unit-emoji { font-size: 22px; }
.unit .nums { font-size: 12px; color: var(--ink-dim); margin: 3px 0; display: flex; justify-content: space-between; }
.statuses { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; min-height: 16px; }
.chip { font-size: 10px; padding: 1px 6px; border-radius: 999px; border: 1px solid var(--line); background: #221a30; }
.chip.bad { color: #f0a99c; border-color: #5a2a25; }
.chip.good { color: #a9e0a9; border-color: #2c5a2c; }
.chip.shield { color: #9ccdf0; border-color: #28526a; }
.hitflash { animation: hit .4s; }
@keyframes hit { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); background:#3a1c1c; } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }
.healflash { animation: healf .5s; }
@keyframes healf { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 16px #6cba6caa inset; } }

.turn-banner { text-align: center; font-weight: 700; color: var(--gold); padding: 4px; letter-spacing: .5px; }
.ability-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ability-btn { text-align: left; border: 1px solid var(--line); border-radius: 10px; padding: 9px 10px; background: var(--panel2); cursor: pointer; transition: border-color .12s, transform .06s; }
.ability-btn:active { transform: translateY(1px); }
.ability-btn:disabled { opacity: .4; }
.ability-btn .an { font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; }
.ability-btn .ad { font-size: 11px; color: var(--ink-dim); margin-top: 2px; line-height: 1.3; }
.ability-btn .cost { color: var(--focus2); font-size: 11px; }
.cd-pill { color: var(--ink-dim); font-size: 10px; }

.log { background: #0c0913; border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; height: 132px; overflow-y: auto; font-size: 12.5px; line-height: 1.5; }
.log .e { padding: 1px 0; border-bottom: 1px dotted #ffffff08; }
.log .damage { color: #e9b0a6; }
.log .crit { color: #ffd27a; font-weight: 700; }
.log .heal { color: #a9e0a9; }
.log .miss { color: var(--ink-dim); }
.log .status { color: #c9b6e8; }
.log .death { color: var(--bad); font-weight: 700; }
.log .info { color: var(--ink-dim); }
.log .focus { color: #9ccdf0; }

/* ---------- Dice overlay ---------- */
.dice-layer { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0009; z-index: 50; gap: 14px; }
.dice-die {
  width: 108px; height: 108px; display: flex; align-items: center; justify-content: center;
  font-size: 46px; font-weight: 800; color: #1a1326;
  background: radial-gradient(circle at 35% 30%, #ffe9b0, var(--gold) 70%);
  clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
  box-shadow: 0 0 40px #e8b65988; text-shadow: 0 1px 0 #fff8;
}
.dice-die.rolling { animation: tumble .6s ease; }
@keyframes tumble { 0% { transform: rotate(-180deg) scale(.4); } 60% { transform: rotate(20deg) scale(1.15); } 100% { transform: rotate(0) scale(1); } }
.dice-die.crit { background: radial-gradient(circle at 35% 30%, #fff, #ffd27a 70%); box-shadow: 0 0 60px #ffd27a; }
.dice-die.fumble { background: radial-gradient(circle at 35% 30%, #d98, var(--blood) 70%); color: #1a0d0a; box-shadow: 0 0 40px #b6402f; }
.dice-caption { color: var(--ink); font-size: 15px; font-weight: 600; text-align: center; background: #0008; padding: 6px 14px; border-radius: 10px; }

/* ---------- Shop / lists ---------- */
.list { display: flex; flex-direction: column; gap: 8px; }
.li { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
.li .grow { flex: 1; }
.li .iname { font-weight: 600; }
.li .idesc { font-size: 12px; color: var(--ink-dim); }
.li .price { color: var(--gold); font-weight: 700; font-size: 14px; }
.gear-li { align-items: flex-start; }
.set-tag { color: var(--gold); border-color: var(--gold-dim); }

/* ---------- Modal ---------- */
.modal-back { position: fixed; inset: 0; background: #000b; z-index: 40; display: flex; align-items: flex-end; justify-content: center; animation: fade .2s; }
.modal { background: var(--bg2); border: 1px solid var(--line); border-top-left-radius: 18px; border-top-right-radius: 18px; width: 100%; max-width: 920px; max-height: 86vh; overflow-y: auto; padding: 16px; box-shadow: 0 -10px 40px #000a; }
.modal h2 { color: var(--gold); }
.modal-head { display: flex; justify-content: space-between; align-items: center; position: sticky; top: -16px; background: var(--bg2); padding: 6px 0 10px; margin: -6px 0 6px; }

.toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); background: #2a2238; border: 1px solid var(--gold-dim); color: var(--ink); padding: 10px 16px; border-radius: 12px; z-index: 60; box-shadow: 0 6px 20px #000a; animation: fade .2s; max-width: 90%; text-align: center; pointer-events: none; transition: bottom .15s ease; }

/* ---------- Character creation ---------- */
.creation { gap: 10px; }
.crt-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.crt-tab { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 8px 4px; cursor: pointer; text-align: center; transition: border-color .12s; }
.crt-tab.sel { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
.crt-emoji { font-size: 22px; }
.crt-tname { font-size: 11px; color: var(--ink-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.creation-card { display: flex; flex-direction: column; gap: 10px; }
.picker { border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; background: #170f23; }
.picker-head { display: flex; justify-content: space-between; align-items: center; }
.picker-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
.picker-ctrls { display: flex; gap: 6px; }
.picker-arrow { min-width: 36px; font-size: 18px; padding: 2px 8px; }
.picker-name { font-weight: 700; font-size: 16px; }
.picker-desc { font-size: 12px; line-height: 1.35; margin-top: 2px; }
.alloc-wrap { border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; background: #170f23; }
.alloc-points { font-size: 12px; color: var(--ink-dim); }
.alloc-points.has { color: var(--gold); font-weight: 700; }
.alloc-row { display: grid; grid-template-columns: 1fr 40px 90px 40px; align-items: center; gap: 6px; margin-top: 6px; }
.alloc-name { font-size: 14px; }
.alloc-btn { min-width: 40px; font-size: 18px; padding: 2px; }
.alloc-val { text-align: center; font-weight: 600; }
.derived { display: flex; justify-content: space-around; gap: 8px; font-size: 14px; font-weight: 600; background: #0c0913; border-radius: 10px; padding: 8px; border: 1px solid var(--line); }
.trait-list { display: flex; flex-direction: column; gap: 5px; }
.trait-chip { font-size: 11.5px; color: var(--ink-dim); background: #221a30; border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px; line-height: 1.3; }
.trait-chip b { color: var(--gold); }

/* ---------- Talents ---------- */
.talent-wrap { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
.talent-tier { border: 1px solid var(--line); border-radius: 12px; padding: 10px; background: #170f23; }
.tier-head { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--gold); margin-bottom: 8px; }
.talent-node { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 7px; background: var(--panel); }
.talent-node:last-child { margin-bottom: 0; }
.talent-node .tname { font-weight: 700; font-size: 14px; }
.talent-node .tdesc { font-size: 12px; color: var(--ink-dim); line-height: 1.35; }
.talent-node.owned { border-color: var(--good); box-shadow: 0 0 0 1px #2c5a2c inset; }
.talent-node.learnable { border-color: var(--gold); }
.talent-node.locked { opacity: .5; }
.talent-node.unavail { opacity: .8; }

/* ---------- Settings ---------- */
.set-list { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
.set-row { display: flex; align-items: center; gap: 10px; }
.set-row > span:first-child { flex: 0 0 70px; font-size: 14px; }
.vol-slider { flex: 1; accent-color: var(--gold); height: 26px; }
.vol-num { flex: 0 0 30px; text-align: right; color: var(--ink-dim); font-size: 13px; }

.kv { display: grid; grid-template-columns: auto 1fr; gap: 2px 10px; font-size: 13px; }
.kv .k { color: var(--ink-dim); }
.center-col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.big-emoji { font-size: 56px; }
.lvlup { color: var(--gold); font-weight: 700; }
</style>
</head>

  <div class="dice-caption" id="dice-caption"></div>
</div>

You four are the last of the Wardens' Oath: sworn to walk into the rot and put out the crown's grey fire. The road south begins at the ruined waystation of Greyhollow.`,choices:[{text:"Begin the journey",goto:"town1"}]},town1:{id:"town1",title:"Greyhollow Waystation",art:"\u{1F3DA}\uFE0F",text:"A handful of survivors huddle around a peat fire. A crook-backed apothecary has set up a stall of salves and oddments, and the old stable still has dry straw to sleep on. South, the Sunken Road drowns into mist.",onEnter:{startQuest:"hollow-crown",unlockLore:"the-hollowing"},choices:[{text:"Visit the apothecary (Shop)",shop:!0},{text:"Forage the waystation for moonherb",gather:!0,effects:{giveItems:["mat-moonherb","mat-moonherb"],setFlag:"gather_town1"},hideIfFlag:"gather_town1"},{text:"Rest at the stable \u2014 heal the party (20 gold)",rest:!0},{text:"Take the Sunken Road south",goto:"road1"}]},road1:{id:"road1",title:"The Sunken Road",art:"\u{1F32B}\uFE0F",text:"Black water laps at a causeway of broken stone. Something pale skitters away into the reeds \u2014 then more of them turn, and come back hungry.",choices:[{text:"Stand and fight",combat:{enemies:["hollow-rat","hollow-rat","rot-crawler"],victoryNode:"road2"}}]},road2:{id:"road2",title:"The Drowned Wagon",art:"\u{1F6D2}",text:"A merchant's wagon lies half-sunk in the mire, its strongbox glinting beneath the murk. The wood is rotten and the water deeper than it looks.",choices:[{text:"Study the wreck for traps and footing (Wits, DC 13)",check:{attr:"wits",dc:13,successNode:"road2_loot",failNode:"road2_ambush"}},{text:"Force the strongbox open by main strength (Might, DC 14)",check:{attr:"might",dc:14,successNode:"road2_loot",failNode:"road2_ambush"}},{text:"Salvage scrap metal from the wreck",gather:!0,effects:{giveItems:["mat-iron-scrap","mat-iron-scrap"],setFlag:"gather_road2"},hideIfFlag:"gather_road2"},{text:"Leave it and press on",goto:"road3"}]},road2_loot:{id:"road2_loot",title:"A Lucky Find",art:"\u{1F4B0}",text:"You work the box free without disturbing the muck. Inside: coin, and a vial that smells of copper and life.",onEnter:{gold:45,giveItems:["potion-major"]},choices:[{text:"Pocket it and move on",goto:"road3"}]},road2_ambush:{id:"road2_ambush",title:"Sprung!",art:"\u{1FAA4}",text:"The wagon shifts \u2014 and husks that were hiding beneath it rise out of the water, blades drawn.",choices:[{text:"Fight!",combat:{enemies:["husk-bandit","husk-bandit","rot-crawler"],victoryNode:"road3"}}]},road3:{id:"road3",title:"The Toll Bridge",art:"\u{1F309}",text:"A collapsed gatehouse blocks the bridge. You could heave the rubble aside, or slip along the slick ledge around it \u2014 one wrong step into the current, though.",choices:[{text:"Clear the rubble together (Might, DC 12)",check:{attr:"might",dc:12,successNode:"road3_clear",failNode:"road3_hurt"}},{text:"Edge around on the ledge (Agility, DC 13)",check:{attr:"agility",dc:13,successNode:"road3_clear",failNode:"road3_hurt"}}]},road3_clear:{id:"road3_clear",title:"Across",art:"\u2705",text:"You make it across without a scratch and catch your breath on the far bank.",choices:[{text:"Press toward the chapel bell",goto:"road_boss"}]},road3_hurt:{id:"road3_hurt",title:"A Hard Crossing",art:"\u{1FA79}",text:"Someone slips; the current drags before you haul them out, soaked and battered. You cross, but worse for wear.",onEnter:{healPercent:-15},choices:[{text:"Press toward the chapel bell",goto:"road_boss"}]},road_boss:{id:"road_boss",title:"The Warden of Thorns",art:"\u{1F33F}",text:"At the end of the road, a thing of bramble and bone unfolds from the ruined shrine \u2014 the Hollowing wearing a dead druid like a glove. It was a Warden once, like you. It remembers the Oath, and hates it.",onEnter:{startQuest:"warden-of-thorns"},choices:[{text:"End its suffering",combat:{enemies:["warden-of-thorns"],victoryNode:"road_clear"}}]},road_clear:{id:"road_clear",title:"First Light",art:"\u{1F305}",text:"The bramble-thing comes apart into ordinary thorns, and for a moment the mist thins. Among its roots: a phoenix tear, and the way south to the Drowned Chapel. There's time to return to Greyhollow first.",onEnter:{xp:30,completeQuest:"warden-of-thorns",unlockLore:"wardens-oath"},choices:[{text:"Return to Greyhollow",goto:"town2"},{text:"Push on to the Drowned Chapel",goto:"chapel1"}]},town2:{id:"town2",title:"Greyhollow Waystation",art:"\u{1F3DA}\uFE0F",text:"Word of the Warden's fall has spread; the survivors look at you with something like hope. The apothecary has restocked.",choices:[{text:"Visit the apothecary (Shop)",shop:!0},{text:"Rest at the stable \u2014 heal the party (20 gold)",rest:!0},{text:"Brave the Rimewood (optional)",goto:"rime_enter"},{text:"Travel to the Drowned Chapel",goto:"chapel1"}]},chapel1:{id:"chapel1",title:"The Drowned Chapel",art:"\u26EA",text:"The chapel has sunk to its windows in black water. Candlelight moves behind the glass though no living hand could light it. Pale acolytes drift between the pews, chanting to the crown.",onEnter:{startQuest:"drowned-faithful"},choices:[{text:"Cut through the congregation",combat:{enemies:["pale-acolyte","pale-acolyte","bog-lurker"],victoryNode:"chapel2"}}]},chapel2:{id:"chapel2",title:"The Reliquary",art:"\u{1F56F}\uFE0F",text:"Behind the altar, a locked reliquary hums with warded power. The lock is a puzzle of brass rings; the wards will bite the careless.",choices:[{text:"Pick the warded lock (Agility, DC 14)",check:{attr:"agility",dc:14,successNode:"chapel2_loot",failNode:"chapel2_zap"}},{text:"Unravel the wards by lore (Wits, DC 15)",check:{attr:"wits",dc:15,successNode:"chapel2_loot",failNode:"chapel2_zap"}},{text:"Pry a bone charm from the reliquary frame",gather:!0,effects:{giveItems:["mat-bone-charm","mat-moonherb"],setFlag:"gather_chapel2"},hideIfFlag:"gather_chapel2"},{text:"Ignore it and find the bishop",goto:"chapel_boss"}]},chapel2_loot:{id:"chapel2_loot",title:"The Reliquary Opens",art:"\u{1F4FF}",text:"The rings click home and the wards sigh out. Within: a runed vest and a purse of old coin.",onEnter:{gold:60,giveItems:["arm-runed-vest"]},choices:[{text:"Seek the bishop",goto:"chapel_boss"}]},chapel2_zap:{id:"chapel2_zap",title:"Warded!",art:"\u26A1",text:"The wards discharge in a sheet of cold fire. The reliquary stays shut, and you stagger back smarting.",onEnter:{healPercent:-12},choices:[{text:"Seek the bishop",goto:"chapel_boss"}]},chapel_boss:{id:"chapel_boss",title:"The Pale Bishop",art:"\u2626\uFE0F",text:"At the flooded altar stands the Pale Bishop, the Hollow King's mouth in the south. It raises grey hands, and the drowned dead raise their heads. 'Kneel,' it says, with a hundred throats, 'and be hollow, and be at peace.'",onEnter:{unlockLore:"the-pale-bishop"},choices:[{text:"Refuse",combat:{enemies:["the-pale-bishop","pale-acolyte"],victoryNode:"chapel_clear"}}]},chapel_clear:{id:"chapel_clear",title:"The Bell Tolls Once",art:"\u{1F514}",text:"The Bishop folds inward and is gone. Its stormcaller rod clatters to the wet stone, still crackling. North, past the marsh, the Ashen Keep rises black against a sky the color of a bruise \u2014 the Hollow King waits there.",onEnter:{xp:45,giveItems:["wpn-stormrod"],completeQuest:"drowned-faithful"},choices:[{text:"Return to Greyhollow to prepare",goto:"town3"},{text:"March on the Ashen Keep",goto:"keep1"}]},town3:{id:"town3",title:"Greyhollow \u2014 The Last Night",art:"\u{1F525}",text:"The survivors give what they have: a hot meal, a whetstone, a blessing. Everyone knows what marching on the Keep means. The apothecary presses her finest wares on you and will not take no.",choices:[{text:"Visit the apothecary (Shop)",shop:!0},{text:"Rest at the stable \u2014 heal the party (20 gold)",rest:!0},{text:"March on the Ashen Keep",goto:"keep1"}]},keep1:{id:"keep1",title:"The Ashen Keep \u2014 Gatehouse",art:"\u{1F3F0}",text:"Wraith knights stand the gate, grey banners hanging in air that does not move. They lower their lances as one.",onEnter:{startQuest:"silver-of-the-keep"},choices:[{text:"Break through the gate",combat:{enemies:["wraith-knight","wraith-knight"],victoryNode:"keep2"}}]},keep2:{id:"keep2",title:"The Hall of Grey Candles",art:"\u{1F56F}\uFE0F",text:"A long hall of guttering candles. Hollow mages turn from their books, and the air goes thin with old magic. A side passage might let you slip past \u2014 if you're quiet enough.",choices:[{text:"Slip past in the dark (Agility, DC 15)",check:{attr:"agility",dc:15,successNode:"keep3",failNode:"keep2_fight"}},{text:"Loot silver and emberdust from the hall",gather:!0,effects:{giveItems:["mat-silver-ingot","mat-emberdust","mat-silver-ingot"],setFlag:"gather_keep2",completeQuest:"silver-of-the-keep"},hideIfFlag:"gather_keep2"},{text:"Fight through the mages",combat:{enemies:["hollow-mage","hollow-mage","wraith-knight"],victoryNode:"keep3"}}]},keep2_fight:{id:"keep2_fight",title:"Spotted!",art:"\u{1F441}\uFE0F",text:"A candle gutters at the wrong moment. The mages' heads turn together, eyes full of grey light.",choices:[{text:"No choice but to fight",combat:{enemies:["hollow-mage","hollow-mage"],victoryNode:"keep3"}}]},keep3:{id:"keep3",title:"The Barrow Throne",art:"\u{1F451}",text:`The throne room is a barrow opened to the sky. On a seat of root and bone sits the Hollow King, the grey crown burning cold above his brow. He does not rise. He does not need to.

'You carry the Oath,' he says, and his voice is the Hollowing itself. 'Good. I have been so lonely, and the Oath makes such patient hollows.'

This is what you came for. Rest now, or end it.`,onEnter:{unlockLore:"the-grey-crown"},choices:[{text:"Steady yourselves (Rest \u2014 20 gold)",rest:!0},{text:"Use the moment to ready gear (Shop)",shop:!0},{text:"Put out the grey fire",combat:{enemies:["the-hollow-king"],victoryNode:"ending_victory"}}]},rime_enter:{id:"rime_enter",title:"The Rimewood \u2014 Edge",art:"\u{1F332}",text:"The road east climbs into a wood gripped by endless winter. At a lean-to of frozen hide, a one-eyed old soldier named Hesken warms his hands over coals that barely glow. 'Wardens went in a year past,' he rasps. 'None came out. But I hear armor on the wind some nights. Something keeps their watch now. Put it down, would you?'",onEnter:{startQuest:"frozen-vigil",unlockLore:"the-rimewood"},choices:[{text:"Ask Hesken what he saw",goto:"rime_hesken"},{text:"Enter the frozen wood",goto:"rime_path"},{text:"Return to Greyhollow",goto:"town2"}]},rime_hesken:{id:"rime_hesken",title:"Hesken's Tale",art:"\u{1F525}",text:"'Captain Varn led them \u2014 good Wardens, every one. The cold here ain't natural; it's older than the rot, and it don't melt for spring nor fire. They marched to a cairn deep in, where the trees stop. That's where the armor walks.' He spits into the coals. 'Take their blade if you find it. They'd want it used, not buried.'",choices:[{text:"Step into the wood",goto:"rime_path"}]},rime_path:{id:"rime_path",title:"The Frozen Trail",art:"\u2744\uFE0F",text:"Black trunks crowd a trail of blue ice. A frozen river bars the way, a thicket of ice-sheathed bramble to one side, and\u2014half-buried\u2014the corner of a Warden's cache catching the grey light.",choices:[{text:"Cross the frozen river (Agility, DC 13)",check:{attr:"agility",dc:13,successNode:"rime_grove",failNode:"rime_hurt"}},{text:"Break through the frozen thicket (Might, DC 13)",check:{attr:"might",dc:13,successNode:"rime_grove",failNode:"rime_hurt"}},{text:"Dig out the half-buried cache (Wits, DC 14)",check:{attr:"wits",dc:14,successNode:"rime_secret",failNode:"rime_grove"}}]},rime_hurt:{id:"rime_hurt",title:"Through the Cold",art:"\u{1FA79}",text:"The ice gives way; someone goes through to the waist before you haul them out, blue-lipped and shaking. You press on, chilled to the bone.",onEnter:{healPercent:-12},choices:[{text:"Press deeper",goto:"rime_grove"}]},rime_secret:{id:"rime_secret",title:"The Warden's Cache",art:"\u{1F9CA}",text:"Beneath the ice lie cloaks of the Oath, frozen mid-stride, and a captain's journal. You take what they can no longer use \u2014 coin, old silver, and the truth of what happened here.",onEnter:{gold:40,giveItems:["mat-silver-ingot","treasure-ancient-coin"],unlockLore:"the-frozen-wardens"},choices:[{text:"Press deeper",goto:"rime_grove"}]},rime_grove:{id:"rime_grove",title:"The Pale Grove",art:"\u{1F32B}\uFE0F",text:"Frost-wisps drift between the trunks like cold lanterns \u2014 and turn, as one, toward the warmth of the living.",choices:[{text:"Cut through them",combat:{enemies:["frost-wisp","frost-wisp","rime-stalker"],victoryNode:"rime_deep"}}]},rime_deep:{id:"rime_deep",title:"Where the Trees Stop",art:"\u26F0\uFE0F",text:"The wood thins to a clearing of black stone and a cairn ringed with frozen Wardens, still kneeling. The air here hums with cold. Their watcher is near.",choices:[{text:"Chip frozen silver from the dead trees",gather:!0,effects:{giveItems:["mat-silver-ingot","mat-emberdust"],setFlag:"gather_rime"},hideIfFlag:"gather_rime"},{text:"Approach the cairn",combat:{enemies:["frozen-thrall","frozen-thrall","frost-wisp"],victoryNode:"rime_boss"}}]},rime_boss:{id:"rime_boss",title:"The Hoarfrost Knight",art:"\u{1F6E1}\uFE0F",text:"From the cairn rises a figure in rimed plate, a Warden's cloak frozen to its shoulders \u2014 Captain Varn, or what the cold made of her. Frost sheets off the armor as it lifts a blade of blue ice. It keeps the vigil still.",choices:[{text:"Give the vigil its rest",combat:{enemies:["the-hoarfrost-knight"],victoryNode:"rime_clear"}}]},rime_clear:{id:"rime_clear",title:"The Cold Breaks",art:"\u{1F305}",text:"The armor comes apart in a fall of frost, and for the first time in a year the Rimewood is merely cold, not cruel. Winter's Edge lies bright in the snow. The frozen Wardens, freed, sink quietly into rest. Hesken will sleep easier \u2014 and so, perhaps, will you.",onEnter:{xp:40,completeQuest:"frozen-vigil"},choices:[{text:"Return to Greyhollow",goto:"town2"}]},ending_victory:{id:"ending_victory",title:"The Crown Goes Out",art:"\u{1F304}",text:`The grey crown cracks like river ice and the cold fire gutters out. The Hollow King sighs \u2014 almost grateful \u2014 and is, at last, only a dead man on a throne of roots.

Far to the north, in Greyhollow, the peat fire burns a little warmer, and the first green thing in a year pushes up through the ash. The Wardens' Oath is kept.

\u2014 THE END \u2014

Thank you for playing Dicebound: The Hollow Crown.`,isEnding:"victory",onEnter:{completeQuest:"hollow-crown"},choices:[{text:"Return to the title",goto:"intro"}]},ending_defeat:{id:"ending_defeat",title:"Hollowed",art:"\u{1F480}",text:`The grey light takes you, one by one, and the Oath becomes another patient hollow in the Hollow King's long quiet court.

But the dead remember. Somewhere, someone takes up the Oath again...

\u2014 DEFEAT \u2014`,isEnding:"defeat",choices:[{text:"Try again",goto:"intro"}]}},Xt="intro";var Ia={"hollow-rat":{id:"hollow-rat",ai:"aggressive",resist:{holy:1.5,dark:.5},name:"Hollow Rat",attributes:{might:9,agility:13,wits:6,spirit:6},maxHP:14,baseDefense:12,abilities:["bite"],xpReward:12,goldReward:6,lootTable:[{itemId:"potion-minor",chance:.2}]},"rot-crawler":{id:"rot-crawler",ai:"default",resist:{fire:1.5,poison:.5},name:"Rot Crawler",attributes:{might:11,agility:11,wits:7,spirit:8},maxHP:20,baseDefense:12,abilities:["claw","spit-poison"],xpReward:18,goldReward:9,lootTable:[{itemId:"antidote",chance:.25}]},"husk-bandit":{id:"husk-bandit",ai:"aggressive",resist:{holy:1.25},name:"Husk Bandit",attributes:{might:13,agility:12,wits:9,spirit:8},maxHP:26,baseDefense:13,abilities:["claw","heavy-smash"],xpReward:22,goldReward:14,lootTable:[{itemId:"potion-minor",chance:.3},{itemId:"war-tonic",chance:.1}]},"pale-acolyte":{id:"pale-acolyte",ai:"tactician",resist:{holy:1.5,dark:.5},name:"Pale Acolyte",attributes:{might:9,agility:11,wits:14,spirit:12},maxHP:24,baseDefense:13,abilities:["hex","drain-life"],xpReward:26,goldReward:16,lootTable:[{itemId:"potion-focus",chance:.3}]},"bog-lurker":{id:"bog-lurker",ai:"berserker",resist:{fire:1.5,poison:.5,ice:.75},name:"Bog Lurker",attributes:{might:14,agility:9,wits:8,spirit:9},maxHP:34,baseDefense:12,abilities:["gnash","heavy-smash"],xpReward:30,goldReward:18,lootTable:[{itemId:"potion-major",chance:.2}]},"wraith-knight":{id:"wraith-knight",ai:"aggressive",resist:{holy:1.5,dark:.5,physical:.85},name:"Wraith Knight",attributes:{might:15,agility:12,wits:11,spirit:10},maxHP:40,baseDefense:15,abilities:["gnash","heavy-smash","wail"],xpReward:38,goldReward:24,lootTable:[{itemId:"potion-major",chance:.25},{itemId:"trk-warding-eye",chance:.08}]},"hollow-mage":{id:"hollow-mage",ai:"tactician",resist:{holy:1.5,dark:.5},name:"Hollow Mage",attributes:{might:8,agility:12,wits:17,spirit:13},maxHP:32,baseDefense:13,abilities:["hex","hollow
